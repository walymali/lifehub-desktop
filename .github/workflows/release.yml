name: Release

# Triggers on a version tag push (e.g. v1.0.1) — builds Mac + Windows + Linux
# installers and publishes them as a GitHub Release. electron-updater on
# customers' machines polls this release feed and auto-downloads new versions.

on:
  push:
    tags:
      - 'v*.*.*'

# GITHUB_TOKEN is read-only by default in new repos (since 2024).
# We need write to publish releases.
permissions:
  contents: write

jobs:
  release:
    runs-on: ${{ matrix.os }}
    strategy:
      # Don't cancel Mac/Linux when one platform fails — we'd rather ship 2 of 3
      # than 0 of 3, and we can fix the broken platform in a follow-up tag.
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Build (Mac)
        if: matrix.os == 'macos-latest'
        run: npx electron-builder --mac --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Add Apple notarization secrets here once you have an Apple Developer account:
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Build (Windows)
        if: matrix.os == 'windows-latest'
        # Wrap in PowerShell retry loop — Windows runners flake on the NSIS
        # binary download from electron-builder's CDN about 30% of the time.
        # Three attempts with a short backoff is plenty to clear transient
        # network blips without lengthening the happy-path build.
        shell: pwsh
        run: |
          $attempt = 1
          $maxAttempts = 3
          while ($attempt -le $maxAttempts) {
            Write-Host "::group::Windows build attempt $attempt/$maxAttempts"
            npx electron-builder --win --publish always
            if ($LASTEXITCODE -eq 0) {
              Write-Host "::endgroup::"
              Write-Host "✓ Windows build succeeded on attempt $attempt"
              exit 0
            }
            Write-Host "::endgroup::"
            Write-Host "⚠ attempt $attempt failed (exit $LASTEXITCODE), retrying in 10s..."
            Start-Sleep -Seconds 10
            $attempt++
          }
          Write-Host "✗ Windows build failed after $maxAttempts attempts"
          exit 1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: npx electron-builder --linux --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
