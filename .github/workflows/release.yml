name: Release

# Triggers on a version tag push (e.g. v1.2.0) — builds Mac (Intel + Silicon),
# Windows (NSIS + portable + AppX for Microsoft Store), and Linux (AppImage +
# deb + snap) installers, then publishes them as a GitHub Release.
#
# Mac App Store (.pkg) only builds when APPLE_ID is configured as a secret —
# without an Apple Developer cert the build fails, so we gate it explicitly.
# All other targets work without paid accounts.

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  release:
    runs-on: ${{ matrix.os }}
    strategy:
      # Don't cancel Mac/Linux when one platform fails — we'd rather ship 2 of 3
      # than 0 of 3, and we can fix the broken platform in a follow-up tag.
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      # ── macOS: arm64 + x64 (Intel) DMG/zip — works without code signing ──
      - name: Build (Mac standalone)
        if: matrix.os == 'macos-latest'
        run: npx electron-builder --mac --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Mac App Store .pkg — only when Apple Developer cert is configured ──
      - name: Build (Mac App Store)
        if: matrix.os == 'macos-latest' && env.APPLE_ID != ''
        run: npx electron-builder --mac mas --publish never
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Upload Mac App Store package
        if: matrix.os == 'macos-latest' && env.APPLE_ID != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: dist/*.pkg
          fail_on_unmatched_files: false
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}

      # ── Windows: NSIS installer + portable EXE — build local, upload separately ──
      # (electron-builder's GitHub uploader hangs on 95MB+ files about half the
      # time. Upload happens via softprops/action-gh-release which is more robust.)
      - name: Build (Windows standalone)
        if: matrix.os == 'windows-latest'
        run: npx electron-builder --win --publish never

      - name: Upload Windows artifacts
        if: matrix.os == 'windows-latest'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            dist/*.exe
            dist/*.exe.blockmap
            dist/latest.yml
          fail_on_unmatched_files: false

      # ── Microsoft Store AppX — works without dev account; user uploads later ──
      - name: Build (Windows Store AppX)
        if: matrix.os == 'windows-latest'
        run: npx electron-builder --win appx --publish never
        continue-on-error: true

      - name: Upload Windows Store package
        if: matrix.os == 'windows-latest'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: dist/*.appx
          fail_on_unmatched_files: false

      # ── Linux: AppImage + deb (snap is a separate step below) ──
      - name: Build (Linux AppImage + deb)
        if: matrix.os == 'ubuntu-latest'
        run: npx electron-builder --linux AppImage deb --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Linux Snap (Snap Store distribution). snapcraft has to be installed ──
      # ── on the runner first; this step is best-effort because snap builds   ──
      # ── occasionally fail upstream and we'd rather still ship AppImage+deb. ──
      - name: Install snapcraft
        if: matrix.os == 'ubuntu-latest'
        run: sudo snap install snapcraft --classic
        continue-on-error: true

      - name: Build (Linux Snap)
        if: matrix.os == 'ubuntu-latest'
        run: npx electron-builder --linux snap --publish never
        continue-on-error: true

      - name: Upload Linux Snap
        if: matrix.os == 'ubuntu-latest'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: dist/*.snap
          fail_on_unmatched_files: false
