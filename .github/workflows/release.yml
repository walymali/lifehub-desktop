name: Release

# Triggers on a version tag push (e.g. v1.0.1) — builds Mac + Windows + Linux
# installers and publishes them as a GitHub Release. electron-updater on
# customers' machines polls this release feed and auto-downloads new versions.

on:
  push:
    tags:
      - 'v*.*.*'

# GITHUB_TOKEN is read-only by default in new repos (since 2024).
# We need write to publish releases.
permissions:
  contents: write

jobs:
  release:
    runs-on: ${{ matrix.os }}
    strategy:
      # Don't cancel Mac/Linux when one platform fails — we'd rather ship 2 of 3
      # than 0 of 3, and we can fix the broken platform in a follow-up tag.
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Build (Mac)
        if: matrix.os == 'macos-latest'
        run: npx electron-builder --mac --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Add Apple notarization secrets here once you have an Apple Developer account:
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      # Build the .exe locally — never publish (electron-builder's GitHub
      # uploader hangs on 95MB+ files about half the time). Upload happens
      # in the next step via softprops/action-gh-release which is more robust.
      - name: Build (Windows)
        if: matrix.os == 'windows-latest'
        run: npx electron-builder --win --publish never

      - name: Upload Windows artifacts to release
        if: matrix.os == 'windows-latest'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            dist/*.exe
            dist/*.exe.blockmap
            dist/latest.yml
          fail_on_unmatched_files: false

      - name: Build (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: npx electron-builder --linux --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
