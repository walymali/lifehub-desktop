<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Budget Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Sora', sans-serif;
  background: #f5f5f3;
  color: #1a1a1a;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ── Layout ── */
.app {
  max-width: 1120px;
  margin: 0 auto;
  padding: 48px 24px 80px;
}

header {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  margin-bottom: 40px;
  flex-wrap: wrap;
  gap: 16px;
}

header h1 {
  font-size: 28px;
  font-weight: 700;
  color: #1a1a1a;
  letter-spacing: -0.5px;
}

header h1 span {
  font-weight: 300;
  color: #999;
}

.header-actions {
  display: flex;
  gap: 10px;
  align-items: center;
}

/* ── Month filter ── */
.month-filter select {
  font-family: 'Sora', sans-serif;
  font-size: 13px;
  font-weight: 500;
  padding: 10px 36px 10px 14px;
  border: 1.5px solid #e0e0de;
  border-radius: 10px;
  background: #fff;
  color: #1a1a1a;
  cursor: pointer;
  appearance: none;
  background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%23999' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
  background-repeat: no-repeat;
  background-position: right 14px center;
  transition: border-color 0.2s;
}

.month-filter select:hover {
  border-color: #1a1a1a;
}

/* ── Buttons ── */
.btn {
  font-family: 'Sora', sans-serif;
  font-size: 13px;
  font-weight: 500;
  padding: 10px 20px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.2s;
}

.btn-primary {
  background: #1a1a1a;
  color: #fff;
}

.btn-primary:hover {
  background: #333;
}

.btn-outline {
  background: #fff;
  color: #1a1a1a;
  border: 1.5px solid #e0e0de;
}

.btn-outline:hover {
  border-color: #1a1a1a;
}

.btn-sm {
  padding: 6px 14px;
  font-size: 12px;
  border-radius: 8px;
}

.btn-danger {
  background: none;
  color: #ccc;
  border: none;
  padding: 4px 8px;
  font-size: 16px;
  line-height: 1;
  border-radius: 6px;
}

.btn-danger:hover {
  color: #e74c3c;
  background: #fdf0ef;
}

/* ── Grid ── */
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  margin-bottom: 20px;
}

.grid-3 {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
  margin-bottom: 20px;
}

/* ── Cards ── */
.card {
  background: #fff;
  border-radius: 16px;
  padding: 28px;
  border: 1px solid #ebebea;
}

.card-label {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: #999;
  margin-bottom: 8px;
}

.card-value {
  font-size: 32px;
  font-weight: 700;
  letter-spacing: -1px;
  color: #1a1a1a;
}

.card-value.income {
  color: #2ecc71;
}

.card-value.expense {
  color: #e74c3c;
}

.card-value.balance {
  color: #1a1a1a;
}

.card h2 {
  font-size: 16px;
  font-weight: 600;
  color: #1a1a1a;
  margin-bottom: 20px;
}

/* ── Form ── */
.form-card {
  grid-column: 1 / -1;
}

.form-row {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  align-items: flex-end;
}

.form-group {
  display: flex;
  flex-direction: column;
  gap: 6px;
  flex: 1;
  min-width: 140px;
}

.form-group label {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: #999;
}

.form-group input,
.form-group select {
  font-family: 'Sora', sans-serif;
  font-size: 13px;
  padding: 10px 14px;
  border: 1.5px solid #e0e0de;
  border-radius: 10px;
  background: #fff;
  color: #1a1a1a;
  transition: border-color 0.2s;
}

.form-group input:focus,
.form-group select:focus {
  outline: none;
  border-color: #1a1a1a;
}

.form-group select {
  appearance: none;
  background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%23999' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
  background-repeat: no-repeat;
  background-position: right 14px center;
  padding-right: 36px;
  cursor: pointer;
}

.form-submit {
  padding-bottom: 0;
}

.form-submit .btn {
  height: 42px;
  white-space: nowrap;
}

/* ── Category Breakdown ── */
.category-list {
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.category-item {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.category-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.category-name {
  font-size: 13px;
  font-weight: 500;
  color: #1a1a1a;
  display: flex;
  align-items: center;
  gap: 8px;
}

.category-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  display: inline-block;
}

.category-amount {
  font-size: 13px;
  font-weight: 600;
  color: #1a1a1a;
}

.progress-bar {
  width: 100%;
  height: 6px;
  background: #f0f0ee;
  border-radius: 3px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 0.5s ease;
}

/* ── Bar Chart ── */
.chart-container {
  display: flex;
  align-items: flex-end;
  gap: 8px;
  height: 180px;
  padding-top: 10px;
}

.chart-bar-group {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  height: 100%;
  justify-content: flex-end;
  gap: 6px;
}

.chart-bar {
  width: 100%;
  max-width: 36px;
  border-radius: 6px 6px 2px 2px;
  min-height: 2px;
  transition: height 0.5s ease;
  position: relative;
}

.chart-bar:hover {
  opacity: 0.8;
}

.chart-bar-label {
  font-size: 10px;
  font-weight: 500;
  color: #999;
  text-align: center;
}

.chart-bar-value {
  font-size: 10px;
  font-weight: 600;
  color: #1a1a1a;
  text-align: center;
}

.chart-legend {
  display: flex;
  gap: 20px;
  margin-top: 16px;
  padding-top: 16px;
  border-top: 1px solid #f0f0ee;
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  font-weight: 500;
  color: #999;
}

.legend-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
}

/* ── Transaction List ── */
.transactions-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
}

.transaction-count {
  font-size: 12px;
  font-weight: 500;
  color: #999;
  background: #f5f5f3;
  padding: 4px 12px;
  border-radius: 20px;
}

.transaction-list {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.transaction-item {
  display: flex;
  align-items: center;
  padding: 14px 0;
  border-bottom: 1px solid #f5f5f3;
  gap: 14px;
}

.transaction-item:last-child {
  border-bottom: none;
}

.transaction-icon {
  width: 38px;
  height: 38px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
}

.transaction-icon.income-icon {
  background: #eafaf1;
}

.transaction-icon.expense-icon {
  background: #fdf0ef;
}

.transaction-details {
  flex: 1;
  min-width: 0;
}

.transaction-desc {
  font-size: 13px;
  font-weight: 500;
  color: #1a1a1a;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.transaction-meta {
  font-size: 11px;
  color: #999;
  margin-top: 2px;
}

.transaction-amount {
  font-size: 14px;
  font-weight: 600;
  white-space: nowrap;
}

.transaction-amount.income {
  color: #2ecc71;
}

.transaction-amount.expense {
  color: #e74c3c;
}

/* ── Empty state ── */
.empty-state {
  text-align: center;
  padding: 40px 20px;
  color: #ccc;
  font-size: 13px;
  font-weight: 400;
}

/* ── Toast ── */
.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: #1a1a1a;
  color: #fff;
  padding: 12px 24px;
  border-radius: 12px;
  font-size: 13px;
  font-weight: 500;
  font-family: 'Sora', sans-serif;
  z-index: 1000;
  opacity: 0;
  transition: all 0.3s ease;
  pointer-events: none;
}

.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* ── Responsive ── */
@media (max-width: 768px) {
  .app { padding: 24px 16px 60px; }
  header h1 { font-size: 22px; }
  .grid { grid-template-columns: 1fr; }
  .grid-3 { grid-template-columns: 1fr; }
  .card { padding: 22px; }
  .card-value { font-size: 26px; }
  .form-row { flex-direction: column; }
  .form-group { min-width: 100%; }
  .chart-container { height: 140px; }
}
</style>
</head>
<body>

<div class="app">

  <!-- Header -->
  <header>
    <h1>Budget Tracker <span>/ personal</span></h1>
    <div class="header-actions">
      <div class="month-filter">
        <select id="monthFilter" onchange="renderAll()">
          <!-- populated by JS -->
        </select>
      </div>
      <button class="btn btn-outline" onclick="exportJSON()">Export JSON</button>
    </div>
  </header>

  <!-- Summary Cards -->
  <div class="grid-3" id="summaryCards">
    <div class="card">
      <div class="card-label">Income</div>
      <div class="card-value income" id="totalIncome">$0</div>
    </div>
    <div class="card">
      <div class="card-label">Expenses</div>
      <div class="card-value expense" id="totalExpenses">$0</div>
    </div>
    <div class="card">
      <div class="card-label">Balance</div>
      <div class="card-value balance" id="totalBalance">$0</div>
    </div>
  </div>

  <!-- Add Transaction Form -->
  <div class="card form-card" style="margin-bottom: 20px;">
    <h2>Add Transaction</h2>
    <div class="form-row">
      <div class="form-group">
        <label>Type</label>
        <select id="txType">
          <option value="expense">Expense</option>
          <option value="income">Income</option>
        </select>
      </div>
      <div class="form-group">
        <label>Description</label>
        <input type="text" id="txDesc" placeholder="e.g. Grocery shopping">
      </div>
      <div class="form-group">
        <label>Amount</label>
        <input type="number" id="txAmount" placeholder="0.00" min="0" step="0.01">
      </div>
      <div class="form-group">
        <label>Category</label>
        <select id="txCategory">
          <!-- populated by JS -->
        </select>
      </div>
      <div class="form-group">
        <label>Date</label>
        <input type="date" id="txDate">
      </div>
      <div class="form-group form-submit">
        <button class="btn btn-primary" onclick="addTransaction()">Add</button>
      </div>
    </div>
  </div>

  <!-- Charts and Categories -->
  <div class="grid">

    <!-- Monthly Spending Chart -->
    <div class="card">
      <h2>Monthly Overview</h2>
      <div class="chart-container" id="barChart"></div>
      <div class="chart-legend">
        <div class="legend-item"><span class="legend-dot" style="background:#2ecc71"></span> Income</div>
        <div class="legend-item"><span class="legend-dot" style="background:#e74c3c"></span> Expenses</div>
      </div>
    </div>

    <!-- Category Breakdown -->
    <div class="card">
      <h2>Category Breakdown</h2>
      <div class="category-list" id="categoryBreakdown"></div>
    </div>
  </div>

  <!-- Transactions -->
  <div class="card">
    <div class="transactions-header">
      <h2 style="margin-bottom:0">Transactions</h2>
      <span class="transaction-count" id="txCount">0 transactions</span>
    </div>
    <div class="transaction-list" id="transactionList"></div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
// ── Config ──
const STORAGE_KEY = 'budget_tracker_data';

const CATEGORY_CONFIG = {
  housing:        { label: 'Housing',        color: '#6c5ce7', icon: '🏠' },
  food:           { label: 'Food & Dining',  color: '#e17055', icon: '🍽' },
  transport:      { label: 'Transport',      color: '#00b894', icon: '🚗' },
  utilities:      { label: 'Utilities',      color: '#0984e3', icon: '💡' },
  entertainment:  { label: 'Entertainment',  color: '#fdcb6e', icon: '🎬' },
  health:         { label: 'Health',         color: '#e84393', icon: '💊' },
  shopping:       { label: 'Shopping',       color: '#a29bfe', icon: '🛍' },
  education:      { label: 'Education',      color: '#00cec9', icon: '📚' },
  savings:        { label: 'Savings',        color: '#55efc4', icon: '💰' },
  salary:         { label: 'Salary',         color: '#2ecc71', icon: '💵' },
  freelance:      { label: 'Freelance',      color: '#26de81', icon: '💻' },
  investments:    { label: 'Investments',    color: '#20bf6b', icon: '📈' },
  other:          { label: 'Other',          color: '#b2bec3', icon: '📌' }
};

const EXPENSE_CATEGORIES = ['housing','food','transport','utilities','entertainment','health','shopping','education','savings','other'];
const INCOME_CATEGORIES  = ['salary','freelance','investments','other'];

// ── State ──
let transactions = [];

// ── Persistence ──
function loadData() {
  const raw = localStorage.getItem(STORAGE_KEY);
  if (raw) {
    try { transactions = JSON.parse(raw); } catch(e) { transactions = []; }
  }
  if (!transactions.length) loadDemoData();
}

function saveData() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(transactions));
}

// ── Demo data ──
function loadDemoData() {
  const now = new Date();
  const cm = now.getMonth();
  const cy = now.getFullYear();
  const pm = cm === 0 ? 11 : cm - 1;
  const py = cm === 0 ? cy - 1 : cy;

  const demo = [
    // Current month
    { id: uid(), type:'income',  desc:'Monthly Salary',       amount:5200, category:'salary',        date:d(cy,cm,1)  },
    { id: uid(), type:'income',  desc:'Freelance Project',    amount:850,  category:'freelance',     date:d(cy,cm,5)  },
    { id: uid(), type:'expense', desc:'Rent Payment',         amount:1400, category:'housing',       date:d(cy,cm,1)  },
    { id: uid(), type:'expense', desc:'Grocery Store',        amount:186,  category:'food',          date:d(cy,cm,3)  },
    { id: uid(), type:'expense', desc:'Electric Bill',        amount:95,   category:'utilities',     date:d(cy,cm,4)  },
    { id: uid(), type:'expense', desc:'Gas Station',          amount:52,   category:'transport',     date:d(cy,cm,6)  },
    { id: uid(), type:'expense', desc:'Netflix Subscription', amount:15.99,category:'entertainment', date:d(cy,cm,2)  },
    { id: uid(), type:'expense', desc:'Pharmacy',             amount:34,   category:'health',        date:d(cy,cm,7)  },
    { id: uid(), type:'expense', desc:'Online Course',        amount:49,   category:'education',     date:d(cy,cm,5)  },
    { id: uid(), type:'expense', desc:'New Headphones',       amount:79,   category:'shopping',      date:d(cy,cm,8)  },

    // Previous month
    { id: uid(), type:'income',  desc:'Monthly Salary',       amount:5200, category:'salary',        date:d(py,pm,1)  },
    { id: uid(), type:'income',  desc:'Dividend Income',      amount:320,  category:'investments',   date:d(py,pm,15) },
    { id: uid(), type:'expense', desc:'Rent Payment',         amount:1400, category:'housing',       date:d(py,pm,1)  },
    { id: uid(), type:'expense', desc:'Groceries',            amount:210,  category:'food',          date:d(py,pm,4)  },
    { id: uid(), type:'expense', desc:'Internet Bill',        amount:65,   category:'utilities',     date:d(py,pm,5)  },
    { id: uid(), type:'expense', desc:'Car Insurance',        amount:145,  category:'transport',     date:d(py,pm,10) },
    { id: uid(), type:'expense', desc:'Movie Tickets',        amount:28,   category:'entertainment', date:d(py,pm,12) },
    { id: uid(), type:'expense', desc:'Gym Membership',       amount:40,   category:'health',        date:d(py,pm,1)  },
    { id: uid(), type:'expense', desc:'Books',                amount:35,   category:'education',     date:d(py,pm,18) },
  ];

  transactions = demo;
  saveData();
}

function d(y, m, day) {
  return `${y}-${String(m+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
}

function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
}

// ── Month helpers ──
function getMonthKey(dateStr) {
  return dateStr.slice(0, 7); // "YYYY-MM"
}

function getMonthLabel(key) {
  const [y, m] = key.split('-');
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${months[parseInt(m)-1]} ${y}`;
}

function getAvailableMonths() {
  const set = new Set();
  transactions.forEach(t => set.add(getMonthKey(t.date)));
  return Array.from(set).sort().reverse();
}

function getSelectedMonth() {
  return document.getElementById('monthFilter').value;
}

function getFilteredTransactions() {
  const month = getSelectedMonth();
  if (month === 'all') return [...transactions];
  return transactions.filter(t => getMonthKey(t.date) === month);
}

// ── Populate selects ──
function populateMonthFilter() {
  const sel = document.getElementById('monthFilter');
  const months = getAvailableMonths();
  const prev = sel.value;
  sel.innerHTML = '<option value="all">All Months</option>';
  months.forEach(m => {
    const opt = document.createElement('option');
    opt.value = m;
    opt.textContent = getMonthLabel(m);
    sel.appendChild(opt);
  });
  if (prev && [...sel.options].some(o => o.value === prev)) {
    sel.value = prev;
  } else if (months.length) {
    sel.value = months[0];
  }
}

function populateCategorySelect() {
  const typeSel = document.getElementById('txType');
  const catSel = document.getElementById('txCategory');
  const cats = typeSel.value === 'income' ? INCOME_CATEGORIES : EXPENSE_CATEGORIES;
  catSel.innerHTML = '';
  cats.forEach(c => {
    const opt = document.createElement('option');
    opt.value = c;
    opt.textContent = CATEGORY_CONFIG[c].label;
    catSel.appendChild(opt);
  });
}

// ── Render summary ──
function renderSummary() {
  const txs = getFilteredTransactions();
  const income = txs.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0);
  const expenses = txs.filter(t => t.type === 'expense').reduce((s, t) => s + t.amount, 0);
  const balance = income - expenses;

  document.getElementById('totalIncome').textContent = formatCurrency(income);
  document.getElementById('totalExpenses').textContent = formatCurrency(expenses);

  const balEl = document.getElementById('totalBalance');
  balEl.textContent = formatCurrency(balance);
  balEl.className = 'card-value ' + (balance >= 0 ? 'income' : 'expense');
}

// ── Render category breakdown ──
function renderCategories() {
  const container = document.getElementById('categoryBreakdown');
  const txs = getFilteredTransactions().filter(t => t.type === 'expense');

  if (!txs.length) {
    container.innerHTML = '<div class="empty-state">No expenses this period</div>';
    return;
  }

  const totals = {};
  txs.forEach(t => {
    totals[t.category] = (totals[t.category] || 0) + t.amount;
  });

  const sorted = Object.entries(totals).sort((a, b) => b[1] - a[1]);
  const max = sorted[0][1];

  container.innerHTML = sorted.map(([cat, amount]) => {
    const cfg = CATEGORY_CONFIG[cat] || CATEGORY_CONFIG.other;
    const pct = (amount / max) * 100;
    return `
      <div class="category-item">
        <div class="category-header">
          <div class="category-name">
            <span class="category-dot" style="background:${cfg.color}"></span>
            ${cfg.label}
          </div>
          <div class="category-amount">${formatCurrency(amount)}</div>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" style="width:${pct}%;background:${cfg.color}"></div>
        </div>
      </div>
    `;
  }).join('');
}

// ── Render bar chart ──
function renderChart() {
  const container = document.getElementById('barChart');
  const months = getAvailableMonths().slice(0, 6).reverse();

  if (months.length === 0) {
    container.innerHTML = '<div class="empty-state">No data yet</div>';
    return;
  }

  const data = months.map(m => {
    const txs = transactions.filter(t => getMonthKey(t.date) === m);
    const income = txs.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0);
    const expenses = txs.filter(t => t.type === 'expense').reduce((s, t) => s + t.amount, 0);
    return { month: m, income, expenses };
  });

  const maxVal = Math.max(...data.map(d => Math.max(d.income, d.expenses)), 1);

  container.innerHTML = data.map(item => {
    const incH = (item.income / maxVal) * 100;
    const expH = (item.expenses / maxVal) * 100;
    const label = getMonthLabel(item.month).split(' ')[0];
    return `
      <div class="chart-bar-group">
        <div class="chart-bar-value">${formatCompact(item.income)}</div>
        <div class="chart-bar" style="height:${Math.max(incH, 1)}%;background:#2ecc71" title="Income: ${formatCurrency(item.income)}"></div>
        <div class="chart-bar" style="height:${Math.max(expH, 1)}%;background:#e74c3c" title="Expenses: ${formatCurrency(item.expenses)}"></div>
        <div class="chart-bar-label">${label}</div>
      </div>
    `;
  }).join('');
}

// ── Render transactions ──
function renderTransactions() {
  const container = document.getElementById('transactionList');
  const countEl = document.getElementById('txCount');
  const txs = getFilteredTransactions().sort((a, b) => b.date.localeCompare(a.date) || b.id.localeCompare(a.id));

  countEl.textContent = `${txs.length} transaction${txs.length !== 1 ? 's' : ''}`;

  if (!txs.length) {
    container.innerHTML = '<div class="empty-state">No transactions found</div>';
    return;
  }

  container.innerHTML = txs.map(t => {
    const cfg = CATEGORY_CONFIG[t.category] || CATEGORY_CONFIG.other;
    const isIncome = t.type === 'income';
    const sign = isIncome ? '+' : '-';
    const dateFormatted = new Date(t.date + 'T00:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    return `
      <div class="transaction-item">
        <div class="transaction-icon ${isIncome ? 'income-icon' : 'expense-icon'}">${cfg.icon}</div>
        <div class="transaction-details">
          <div class="transaction-desc">${escapeHtml(t.desc)}</div>
          <div class="transaction-meta">${cfg.label} &middot; ${dateFormatted}</div>
        </div>
        <div class="transaction-amount ${isIncome ? 'income' : 'expense'}">${sign}${formatCurrency(t.amount)}</div>
        <button class="btn btn-danger" onclick="deleteTransaction('${t.id}')" title="Delete">&times;</button>
      </div>
    `;
  }).join('');
}

// ── Actions ──
function addTransaction() {
  const type = document.getElementById('txType').value;
  const desc = document.getElementById('txDesc').value.trim();
  const amount = parseFloat(document.getElementById('txAmount').value);
  const category = document.getElementById('txCategory').value;
  const date = document.getElementById('txDate').value;

  if (!desc) { showToast('Please enter a description'); return; }
  if (!amount || amount <= 0) { showToast('Please enter a valid amount'); return; }
  if (!date) { showToast('Please select a date'); return; }

  transactions.push({ id: uid(), type, desc, amount, category, date });
  saveData();

  // Reset form
  document.getElementById('txDesc').value = '';
  document.getElementById('txAmount').value = '';

  showToast(`${type === 'income' ? 'Income' : 'Expense'} added`);
  renderAll();
}

function deleteTransaction(id) {
  transactions = transactions.filter(t => t.id !== id);
  saveData();
  showToast('Transaction deleted');
  renderAll();
}

function exportJSON() {
  const data = {
    exported: new Date().toISOString(),
    transactions: getFilteredTransactions()
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `budget-${getSelectedMonth() || 'all'}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('Data exported');
}

// ── Utilities ──
function formatCurrency(n) {
  return '$' + n.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function formatCompact(n) {
  if (n >= 1000) return '$' + (n / 1000).toFixed(1) + 'k';
  return '$' + n.toFixed(0);
}

function escapeHtml(str) {
  const el = document.createElement('span');
  el.textContent = str;
  return el.innerHTML;
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toast._timer);
  toast._timer = setTimeout(() => toast.classList.remove('show'), 2400);
}

// ── Render all ──
function renderAll() {
  populateMonthFilter();
  renderSummary();
  renderCategories();
  renderChart();
  renderTransactions();
}

// ── Init ──
document.addEventListener('DOMContentLoaded', () => {
  loadData();

  // Set today as default date
  const today = new Date();
  document.getElementById('txDate').value = today.toISOString().split('T')[0];

  // Update category options when type changes
  document.getElementById('txType').addEventListener('change', populateCategorySelect);
  populateCategorySelect();

  renderAll();
});
</script>

        data-tool-name="Budget Tracker"
        data-category="finance"></script>
