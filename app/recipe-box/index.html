<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recipe Box</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f5f3;
    --card: #ffffff;
    --heading: #1a1a1a;
    --text: #555555;
    --muted: #8a8a8a;
    --border: #ececea;
    --accent: #1a1a1a;
    --accent-soft: #f0efec;
    --danger: #c0392b;
    --warning: #e67e22;
    --success: #27ae60;
    --shadow: 0 1px 2px rgba(0,0,0,0.04), 0 4px 16px rgba(0,0,0,0.04);
    --shadow-hover: 0 4px 12px rgba(0,0,0,0.06), 0 12px 32px rgba(0,0,0,0.08);
    --radius: 16px;
    --radius-sm: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    font-family: 'Sora', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text);
    font-weight: 400;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }

  h1, h2, h3, h4, h5, h6 {
    color: var(--heading);
    font-weight: 600;
    letter-spacing: -0.02em;
  }

  button {
    font-family: inherit;
    cursor: pointer;
    border: none;
    background: none;
    color: inherit;
  }

  input, textarea, select {
    font-family: inherit;
    font-size: 14px;
    color: var(--heading);
  }

  /* Layout */
  .app {
    max-width: 1280px;
    margin: 0 auto;
    padding: 40px 32px 80px;
  }

  /* Header */
  header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 24px;
    margin-bottom: 40px;
    padding-bottom: 32px;
    border-bottom: 1px solid var(--border);
  }

  .brand h1 {
    font-size: 36px;
    font-weight: 700;
    letter-spacing: -0.03em;
    margin-bottom: 4px;
  }

  .brand p {
    color: var(--muted);
    font-size: 14px;
    font-weight: 400;
  }

  .header-actions {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 11px 18px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 500;
    transition: all 0.2s ease;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--heading);
    white-space: nowrap;
  }

  .btn:hover {
    border-color: var(--heading);
    transform: translateY(-1px);
  }

  .btn-primary {
    background: var(--heading);
    color: #fff;
    border-color: var(--heading);
  }

  .btn-primary:hover {
    background: #000;
    border-color: #000;
  }

  .btn-danger {
    color: var(--danger);
    border-color: var(--border);
  }

  .btn-danger:hover {
    border-color: var(--danger);
    background: #fdf2f1;
  }

  .btn-sm {
    padding: 8px 14px;
    font-size: 12px;
  }

  .btn-icon {
    width: 40px;
    height: 40px;
    padding: 0;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
  }

  /* Toolbar */
  .toolbar {
    display: flex;
    gap: 12px;
    margin-bottom: 28px;
    flex-wrap: wrap;
    align-items: center;
  }

  .search {
    flex: 1;
    min-width: 240px;
    position: relative;
  }

  .search input {
    width: 100%;
    padding: 14px 20px 14px 48px;
    border: 1px solid var(--border);
    border-radius: 999px;
    background: var(--card);
    outline: none;
    transition: border-color 0.2s ease;
  }

  .search input:focus {
    border-color: var(--heading);
  }

  .search svg {
    position: absolute;
    left: 18px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
  }

  .category-tabs {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 32px;
  }

  .chip {
    padding: 9px 16px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--text);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .chip:hover {
    border-color: var(--heading);
  }

  .chip.active {
    background: var(--heading);
    color: #fff;
    border-color: var(--heading);
  }

  /* Grid */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 24px;
  }

  .card {
    background: var(--card);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: var(--shadow);
    cursor: pointer;
    transition: transform 0.25s ease, box-shadow 0.25s ease;
    position: relative;
    display: flex;
    flex-direction: column;
  }

  .card:hover {
    transform: translateY(-3px);
    box-shadow: var(--shadow-hover);
  }

  .card-image {
    width: 100%;
    height: 200px;
    object-fit: cover;
    background: var(--accent-soft);
    display: block;
  }

  .card-body {
    padding: 20px 22px 22px;
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  .card-meta {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 10px;
    font-weight: 500;
  }

  .card-meta .dot {
    width: 3px;
    height: 3px;
    border-radius: 50%;
    background: var(--muted);
  }

  .card h3 {
    font-size: 19px;
    margin-bottom: 10px;
    line-height: 1.3;
  }

  .card-info {
    display: flex;
    gap: 16px;
    font-size: 12px;
    color: var(--muted);
    margin-top: auto;
    padding-top: 14px;
  }

  .card-info span {
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .card-favorite {
    position: absolute;
    top: 14px;
    right: 14px;
    width: 38px;
    height: 38px;
    border-radius: 50%;
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(8px);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s ease;
    z-index: 2;
  }

  .card-favorite:hover { transform: scale(1.08); }
  .card-favorite.active svg { fill: #e74c3c; color: #e74c3c; }

  .card-tags {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-top: 12px;
  }

  .tag {
    font-size: 10px;
    padding: 4px 10px;
    background: var(--accent-soft);
    color: var(--text);
    border-radius: 999px;
    text-transform: lowercase;
    font-weight: 500;
  }

  /* Empty state */
  .empty {
    grid-column: 1 / -1;
    text-align: center;
    padding: 80px 20px;
    color: var(--muted);
  }

  .empty h3 {
    color: var(--heading);
    margin-bottom: 8px;
    font-size: 20px;
  }

  /* Modal */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(4px);
    z-index: 100;
    display: none;
    align-items: flex-start;
    justify-content: center;
    padding: 40px 20px;
    overflow-y: auto;
  }

  .modal-backdrop.open { display: flex; }

  .modal {
    background: var(--card);
    border-radius: var(--radius);
    width: 100%;
    max-width: 720px;
    box-shadow: 0 32px 80px rgba(0,0,0,0.25);
    position: relative;
    animation: slideUp 0.3s ease;
  }

  .modal-lg { max-width: 920px; }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .modal-header {
    padding: 28px 32px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 20px;
  }

  .modal-header h2 {
    font-size: 24px;
    letter-spacing: -0.02em;
  }

  .modal-body {
    padding: 28px 32px;
  }

  .modal-footer {
    padding: 20px 32px 28px;
    display: flex;
    gap: 10px;
    justify-content: flex-end;
    flex-wrap: wrap;
  }

  .close-btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: var(--accent-soft);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
    flex-shrink: 0;
  }

  .close-btn:hover { background: #e5e3de; }

  /* Form */
  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 16px;
  }

  .form-row-3 {
    grid-template-columns: 1fr 1fr 1fr;
  }

  .field {
    margin-bottom: 16px;
  }

  .field label {
    display: block;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 7px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .field input,
  .field textarea,
  .field select {
    width: 100%;
    padding: 12px 16px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--bg);
    outline: none;
    transition: border-color 0.2s;
  }

  .field input:focus,
  .field textarea:focus,
  .field select:focus {
    border-color: var(--heading);
  }

  .field textarea {
    resize: vertical;
    min-height: 90px;
    font-family: inherit;
  }

  .field-hint {
    font-size: 11px;
    color: var(--muted);
    margin-top: 5px;
  }

  /* Recipe detail */
  .recipe-hero {
    position: relative;
    height: 320px;
    background: var(--accent-soft);
    overflow: hidden;
    border-radius: var(--radius) var(--radius) 0 0;
  }

  .recipe-hero img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .recipe-detail-body {
    padding: 32px 36px 36px;
  }

  .recipe-title-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 20px;
    margin-bottom: 8px;
    flex-wrap: wrap;
  }

  .recipe-title-row h2 {
    font-size: 28px;
    letter-spacing: -0.02em;
    flex: 1;
    min-width: 250px;
  }

  .recipe-cat-line {
    color: var(--muted);
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 20px;
    font-weight: 500;
  }

  .recipe-stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
    gap: 14px;
    margin: 24px 0 28px;
    padding: 20px;
    background: var(--bg);
    border-radius: var(--radius-sm);
  }

  .stat {
    text-align: center;
  }

  .stat-label {
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 4px;
    font-weight: 500;
  }

  .stat-value {
    font-size: 17px;
    color: var(--heading);
    font-weight: 600;
  }

  .recipe-section {
    margin-bottom: 28px;
  }

  .recipe-section h3 {
    font-size: 15px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
  }

  .servings-control {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--bg);
    padding: 4px;
    border-radius: 999px;
  }

  .servings-control button {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: var(--card);
    color: var(--heading);
    font-weight: 600;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 1px 2px rgba(0,0,0,0.05);
  }

  .servings-control button:hover { background: var(--heading); color: #fff; }
  .servings-control button:disabled { opacity: 0.4; cursor: not-allowed; }

  .servings-control span {
    font-size: 13px;
    font-weight: 500;
    color: var(--heading);
    padding: 0 10px;
    min-width: 70px;
    text-align: center;
  }

  .ingredients-list {
    list-style: none;
  }

  .ingredients-list li {
    padding: 11px 0;
    border-bottom: 1px dashed var(--border);
    font-size: 14px;
    display: flex;
    gap: 10px;
  }

  .ingredients-list li:last-child { border-bottom: none; }

  .ingredients-list li::before {
    content: '';
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--heading);
    margin-top: 9px;
    flex-shrink: 0;
  }

  .steps-list {
    list-style: none;
    counter-reset: step;
  }

  .steps-list li {
    counter-increment: step;
    padding-left: 44px;
    position: relative;
    margin-bottom: 16px;
    font-size: 14px;
    line-height: 1.65;
  }

  .steps-list li::before {
    content: counter(step);
    position: absolute;
    left: 0;
    top: 0;
    width: 30px;
    height: 30px;
    background: var(--heading);
    color: #fff;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 600;
  }

  .notes-block {
    background: #fffbea;
    border: 1px solid #f5e9a7;
    border-radius: var(--radius-sm);
    padding: 16px 20px;
    font-size: 14px;
    color: #7a5f00;
  }

  .tag-list {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 8px;
  }

  .recipe-actions {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 20px;
  }

  /* Cook mode */
  .cook-mode {
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 200;
    display: none;
    flex-direction: column;
    padding: 24px;
  }

  .cook-mode.open { display: flex; }

  .cook-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }

  .cook-header h2 {
    font-size: 20px;
  }

  .cook-content {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    max-width: 900px;
    margin: 0 auto;
    width: 100%;
  }

  .cook-step {
    text-align: center;
  }

  .cook-step-num {
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    margin-bottom: 24px;
    font-weight: 500;
  }

  .cook-step-text {
    font-size: 42px;
    line-height: 1.35;
    color: var(--heading);
    font-weight: 500;
    letter-spacing: -0.02em;
    margin-bottom: 40px;
  }

  .cook-timer {
    display: inline-flex;
    align-items: center;
    gap: 14px;
    padding: 16px 32px;
    background: var(--card);
    border-radius: 999px;
    margin-bottom: 32px;
    box-shadow: var(--shadow);
  }

  .cook-timer-display {
    font-size: 32px;
    font-weight: 700;
    color: var(--heading);
    font-variant-numeric: tabular-nums;
    min-width: 110px;
  }

  .cook-timer-input {
    width: 72px;
    text-align: center;
    padding: 8px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--bg);
  }

  .cook-nav {
    display: flex;
    gap: 16px;
    justify-content: center;
    margin-top: 20px;
    padding: 24px 0;
    border-top: 1px solid var(--border);
  }

  .cook-nav button {
    padding: 14px 32px;
    font-size: 15px;
  }

  .cook-progress {
    height: 4px;
    background: var(--border);
    border-radius: 4px;
    margin-bottom: 32px;
    overflow: hidden;
  }

  .cook-progress-bar {
    height: 100%;
    background: var(--heading);
    transition: width 0.3s ease;
  }

  /* Shopping */
  .shopping-recipes {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    max-height: 340px;
    overflow-y: auto;
    padding: 4px;
  }

  .shopping-item {
    display: flex;
    gap: 10px;
    align-items: center;
    padding: 12px 14px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--bg);
    cursor: pointer;
    transition: all 0.15s;
    font-size: 13px;
  }

  .shopping-item:hover { border-color: var(--heading); }
  .shopping-item input { margin: 0; }
  .shopping-item.selected {
    background: var(--accent-soft);
    border-color: var(--heading);
  }

  .shopping-list {
    background: var(--bg);
    border-radius: var(--radius-sm);
    padding: 20px 24px;
    max-height: 400px;
    overflow-y: auto;
  }

  .shopping-list h4 {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 12px;
    color: var(--muted);
  }

  .shopping-list ul {
    list-style: none;
  }

  .shopping-list li {
    padding: 9px 0;
    border-bottom: 1px dashed var(--border);
    font-size: 13.5px;
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .shopping-list li:last-child { border-bottom: none; }

  .shopping-list input[type="checkbox"] {
    width: 16px;
    height: 16px;
    accent-color: var(--heading);
  }

  .shopping-list li.checked {
    text-decoration: line-through;
    color: var(--muted);
  }

  /* Print */
  @media print {
    body * { visibility: hidden; }
    .print-area, .print-area * { visibility: visible; }
    .print-area {
      position: absolute;
      left: 0; top: 0;
      width: 100%;
      padding: 20px;
    }
    .no-print { display: none !important; }
  }

  /* Responsive */
  @media (max-width: 640px) {
    .app { padding: 24px 16px 60px; }
    .brand h1 { font-size: 28px; }
    .form-row, .form-row-3 { grid-template-columns: 1fr; }
    .shopping-recipes { grid-template-columns: 1fr; }
    .cook-step-text { font-size: 28px; }
    .modal-header, .modal-body, .modal-footer { padding-left: 22px; padding-right: 22px; }
    .recipe-detail-body { padding: 24px 22px; }
  }

  /* Utility */
  .flex { display: flex; }
  .gap-8 { gap: 8px; }
  .gap-12 { gap: 12px; }
  .mt-10 { margin-top: 10px; }
  .mt-20 { margin-top: 20px; }
  .hidden { display: none !important; }
  .text-muted { color: var(--muted); }
</style>
</head>
<body>
  <div class="app">
    <header>
      <div class="brand">
        <h1>Recipe Box</h1>
        <p>Your personal collection of everyday favorites</p>
      </div>
      <div class="header-actions">
        <button class="btn" id="shopping-btn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
          Shopping List
        </button>
        <button class="btn btn-primary" id="add-recipe-btn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          New Recipe
        </button>
      </div>
    </header>

    <div class="toolbar">
      <div class="search">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="search-input" placeholder="Search by name, ingredient, or tag...">
      </div>
      <button class="btn chip" id="fav-filter" data-active="false">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        Favorites
      </button>
    </div>

    <div class="category-tabs" id="category-tabs"></div>

    <div class="grid" id="grid"></div>
  </div>

  <!-- Add/Edit Recipe Modal -->
  <div class="modal-backdrop" id="recipe-modal">
    <div class="modal">
      <div class="modal-header">

      <button class="btn" id="cook-prev">Previous</button>
      <button class="btn btn-primary" id="cook-next">Next Step</button>
    </div>
  </div>

<script>
(() => {
  'use strict';

  const STORAGE_KEY = 'recipe_box';
  const CATEGORIES = ['All', 'Breakfast', 'Lunch', 'Dinner', 'Dessert', 'Drinks', 'Snacks'];

  // Demo recipes
  const DEMO_RECIPES = [

      notes: 'Dont overmix the batter for fluffy pancakes. Let it rest for 5 minutes before cooking.',
      tags: ['sweet', 'breakfast', 'family'],

    },
    {

      category: 'Dessert',
      prepTime: 15,
      cookTime: 12,

      ingredients: '200 g dark chocolate\n0.5 cup butter\n4 eggs\n0.5 cup sugar\n3 tbsp flour\n1 tsp vanilla\n1 pinch salt\n0.25 cup cocoa powder',

    {

      instructions: 'Drain and rinse the chickpeas thoroughly.\nDice the cucumber and tomatoes into bite sized pieces.\nThinly slice the red onion and halve the olives.\nCrumble the feta into the bowl.\nWhisk olive oil, lemon juice, oregano and salt for the dressing.\nCombine all ingredients and toss with the dressing.\nLet marinate for 10 minutes before serving.',

    },
    {

      notes: 'For a vegetarian version substitute tofu for chicken and use vegetable broth.',
      tags: ['thai', 'spicy', 'soup'],
      favorite: false,
      createdAt: Date.now() - 86400000 * 10
    },
    {
      id: 'r7',
      title: 'Fresh Mint Lemonade',
      image: 'https://images.unsplash.com/photo-1523677011781-c91d1bbe2f9e?w=800&auto=format&fit=crop',
      category: 'Drinks',
      prepTime: 10,
      cookTime: 0,
      servings: 4,
      difficulty: 'Easy',
      ingredients: '6 lemons\n0.5 cup sugar\n4 cups cold water\n1 cup fresh mint leaves\n2 cups ice\n1 cup sparkling water',
      instructions: 'Juice the lemons to get about 1 cup of juice.\nMuddle the mint leaves in a pitcher to release the oils.\nAdd sugar and a splash of hot water to dissolve.\nPour in lemon juice and cold water, stir well.\nTaste and adjust sweetness as needed.\nAdd ice and top with sparkling water just before serving.',
      notes: 'For an adult version add a splash of gin or vodka.',
      tags: ['refreshing', 'summer', 'drink'],
      favorite: false,
      createdAt: Date.now() - 86400000 * 2
    },
    {
      id: 'r8',
      title: 'Crispy Kale Chips',
      image: 'https://images.unsplash.com/photo-1515543237350-b3eea1ec8082?w=800&auto=format&fit=crop',
      category: 'Snacks',
      prepTime: 5,
      cookTime: 15,
      servings: 2,
      difficulty: 'Easy',
      ingredients: '1 bunch kale\n2 tbsp olive oil\n0.5 tsp sea salt\n0.25 tsp garlic powder\n0.25 tsp smoked paprika',
      instructions: 'Preheat oven to 300F.\nWash kale and dry very thoroughly, any moisture will prevent crisping.\nRemove stems and tear leaves into bite sized pieces.\nToss with olive oil until evenly coated.\nSpread in a single layer on a baking sheet.\nSprinkle with salt, garlic powder and paprika.\nBake for 12 to 15 minutes until crispy but not brown.\nLet cool completely before serving.',
      notes: 'Store in an airtight container for up to 2 days. They will lose crispness over time.',
      tags: ['healthy', 'vegan', 'snack'],
      favorite: false,
      createdAt: Date.now() - 86400000 * 1
    }
  ];

  // State
  let state = {
    recipes: [],
    search: '',
    category: 'All',
    favoritesOnly: false,
    editingId: null,
    detailId: null,
    detailServings: null,
    cookRecipe: null,
    cookStep: 0,
    selectedShopping: new Set(),
    timer: { interval: null, remaining: 0, running: false }
  };

  // Storage
  function loadData() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        const data = JSON.parse(raw);
        state.recipes = data.recipes || [];
        return;
      }
    } catch (e) { console.error(e); }
    state.recipes = DEMO_RECIPES;
    saveData();
  }

  function saveData() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ recipes: state.recipes }));
  }

  // DOM helpers
  const $ = s => document.querySelector(s);
  const $$ = s => document.querySelectorAll(s);

  function escapeHtml(s) {
    if (s == null) return '';
    return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
  }

  // Parse ingredient line to extract quantity
  function parseIngredient(line) {
    const trimmed = line.trim();
    if (!trimmed) return null;
    const match = trimmed.match(/^(\d+(?:\.\d+)?(?:\/\d+)?)\s*(.*)$/);
    if (match) {
      let qty = match[1];
      if (qty.includes('/')) {
        const [n, d] = qty.split('/').map(Number);
        qty = n / d;
      } else {
        qty = parseFloat(qty);
      }
      return { qty, rest: match[2] };
    }
    return { qty: null, rest: trimmed };
  }

  function formatQty(n) {
    if (n == null) return '';
    if (Number.isInteger(n)) return String(n);
    const rounded = Math.round(n * 100) / 100;
    return String(rounded).replace(/\.?0+$/, '');
  }

  function scaleIngredient(line, factor) {
    const parsed = parseIngredient(line);
    if (!parsed) return line;
    if (parsed.qty == null) return parsed.rest;
    return `${formatQty(parsed.qty * factor)} ${parsed.rest}`.trim();
  }

  // Category tabs
  function renderCategoryTabs() {
    const container = $('#category-tabs');
    container.innerHTML = CATEGORIES.map(cat =>
      `<button class="chip ${state.category === cat ? 'active' : ''}" data-cat="${cat}">${cat}</button>`
    ).join('');
    container.querySelectorAll('.chip').forEach(c => {
      c.onclick = () => { state.category = c.dataset.cat; renderAll(); };
    });
  }

  // Grid
  function getFilteredRecipes() {
    const q = state.search.toLowerCase().trim();
    return state.recipes.filter(r => {
      if (state.category !== 'All' && r.category !== state.category) return false;
      if (state.favoritesOnly && !r.favorite) return false;
      if (q) {
        const hay = [
          r.title,
          r.ingredients,
          (r.tags || []).join(' '),
          r.category
        ].join(' ').toLowerCase();
        if (!hay.includes(q)) return false;
      }
      return true;
    }).sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
  }

  function renderGrid() {
    const grid = $('#grid');
    const recipes = getFilteredRecipes();

    if (!recipes.length) {
      grid.innerHTML = `<div class="empty">
        <h3>No recipes found</h3>
        <p>Try adjusting your search or filters, or add a new recipe.</p>
      </div>`;
      return;
    }

    grid.innerHTML = recipes.map(r => {
      const tags = (r.tags || []).slice(0, 3).map(t => `<span class="tag">${escapeHtml(t)}</span>`).join('');
      return `
        <div class="card" data-id="${r.id}">
          <button class="card-favorite ${r.favorite ? 'active' : ''}" data-fav="${r.id}" title="Favorite">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
          </button>
          ${r.image ? `<img class="card-image" src="${escapeHtml(r.image)}" alt="${escapeHtml(r.title)}" onerror="this.style.display='none'">` : '<div class="card-image"></div>'}
          <div class="card-body">
            <div class="card-meta">
              <span>${escapeHtml(r.category)}</span>
              <span class="dot"></span>
              <span>${escapeHtml(r.difficulty || 'Easy')}</span>
            </div>
            <h3>${escapeHtml(r.title)}</h3>
            <div class="card-info">
              <span>
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                ${(r.prepTime || 0) + (r.cookTime || 0)} min
              </span>
              <span>
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                ${r.servings || 1} servings
              </span>
            </div>
            ${tags ? `<div class="card-tags">${tags}</div>` : ''}
          </div>
        </div>
      `;
    }).join('');

    grid.querySelectorAll('.card').forEach(card => {
      card.onclick = e => {
        if (e.target.closest('[data-fav]')) return;
        openDetail(card.dataset.id);
      };
    });
    grid.querySelectorAll('[data-fav]').forEach(btn => {
      btn.onclick = e => {
        e.stopPropagation();
        toggleFavorite(btn.dataset.fav);
      };
    });
  }

  function toggleFavorite(id) {
    const r = state.recipes.find(x => x.id === id);
    if (r) {
      r.favorite = !r.favorite;
      saveData();
      renderGrid();
      if (state.detailId === id) renderDetail();
    }
  }

  // Modal helpers
  function openModal(sel) { $(sel).classList.add('open'); document.body.style.overflow = 'hidden'; }
  function closeModal(sel) { $(sel).classList.remove('open'); document.body.style.overflow = ''; }
  function closeAllModals() { $$('.modal-backdrop.open').forEach(m => m.classList.remove('open')); document.body.style.overflow = ''; }

  // Recipe form
  function openRecipeForm(recipe = null) {
    const form = $('#recipe-form');
    form.reset();
    state.editingId = recipe ? recipe.id : null;
    $('#recipe-modal-title').textContent = recipe ? 'Edit Recipe' : 'New Recipe';

    if (recipe) {
      form.title.value = recipe.title || '';
      form.image.value = recipe.image || '';
      form.category.value = recipe.category || 'Dinner';
      form.difficulty.value = recipe.difficulty || 'Easy';
      form.prepTime.value = recipe.prepTime || 0;
      form.cookTime.value = recipe.cookTime || 0;
      form.servings.value = recipe.servings || 1;
      form.ingredients.value = recipe.ingredients || '';
      form.instructions.value = recipe.instructions || '';
      form.notes.value = recipe.notes || '';
      form.tags.value = (recipe.tags || []).join(', ');
    }

    openModal('#recipe-modal');
  }

  function saveRecipe(e) {
    e.preventDefault();
    const form = e.target;
    const data = {
      title: form.title.value.trim(),
      image: form.image.value.trim(),
      category: form.category.value,
      difficulty: form.difficulty.value,
      prepTime: parseInt(form.prepTime.value) || 0,
      cookTime: parseInt(form.cookTime.value) || 0,
      servings: parseInt(form.servings.value) || 1,
      ingredients: form.ingredients.value.trim(),
      instructions: form.instructions.value.trim(),
      notes: form.notes.value.trim(),
      tags: form.tags.value.split(',').map(t => t.trim()).filter(Boolean)
    };

    if (state.editingId) {
      const idx = state.recipes.findIndex(r => r.id === state.editingId);
      if (idx >= 0) state.recipes[idx] = { ...state.recipes[idx], ...data };
    } else {
      state.recipes.push({
        id: 'r' + Date.now() + Math.random().toString(36).slice(2, 8),
        favorite: false,
        createdAt: Date.now(),
        ...data
      });
    }
    saveData();
    closeModal('#recipe-modal');
    renderGrid();
  }

  // Detail view
  function openDetail(id) {
    const recipe = state.recipes.find(r => r.id === id);
    if (!recipe) return;
    state.detailId = id;
    state.detailServings = recipe.servings || 1;
    renderDetail();
    openModal('#detail-modal');
  }

  function renderDetail() {
    const recipe = state.recipes.find(r => r.id === state.detailId);
    if (!recipe) return;

    const originalServings = recipe.servings || 1;
    const currentServings = state.detailServings;
    const factor = currentServings / originalServings;

    const ingredients = (recipe.ingredients || '').split('\n').filter(l => l.trim()).map(line => {
      const scaled = scaleIngredient(line, factor);
      return `<li>${escapeHtml(scaled)}</li>`;
    }).join('');

    const steps = (recipe.instructions || '').split('\n').filter(l => l.trim()).map(s =>
      `<li>${escapeHtml(s.trim())}</li>`
    ).join('');

    const tags = (recipe.tags || []).map(t => `<span class="tag">${escapeHtml(t)}</span>`).join('');

    $('#detail-content').innerHTML = `
      <div class="modal-header no-print">
        <div></div>
        <button class="close-btn" data-close>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      ${recipe.image ? `<div class="recipe-hero no-print"><img src="${escapeHtml(recipe.image)}" alt="${escapeHtml(recipe.title)}" onerror="this.parentElement.style.display='none'"></div>` : ''}
      <div class="recipe-detail-body">
        <div class="recipe-title-row">
          <h2>${escapeHtml(recipe.title)}</h2>
          <div class="recipe-actions no-print">
            <button class="btn btn-sm" id="detail-fav" title="Favorite">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="${recipe.favorite ? '#e74c3c' : 'none'}" stroke="${recipe.favorite ? '#e74c3c' : 'currentColor'}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
              ${recipe.favorite ? 'Favorited' : 'Favorite'}
            </button>
            <button class="btn btn-sm" id="detail-cook">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
              Cook Mode
            </button>
            <button class="btn btn-sm" id="detail-print">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
              Print
            </button>
            <button class="btn btn-sm" id="detail-edit">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
              Edit
            </button>
            <button class="btn btn-sm btn-danger" id="detail-delete">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
              Delete
            </button>
          </div>
        </div>
        <div class="recipe-cat-line">${escapeHtml(recipe.category)} &middot; ${escapeHtml(recipe.difficulty || 'Easy')}</div>

        <div class="recipe-stats">
          <div class="stat">
            <div class="stat-label">Prep</div>
            <div class="stat-value">${recipe.prepTime || 0} min</div>
          </div>
          <div class="stat">
            <div class="stat-label">Cook</div>
            <div class="stat-value">${recipe.cookTime || 0} min</div>
          </div>
          <div class="stat">
            <div class="stat-label">Total</div>
            <div class="stat-value">${(recipe.prepTime || 0) + (recipe.cookTime || 0)} min</div>
          </div>
          <div class="stat">
            <div class="stat-label">Servings</div>
            <div class="stat-value">${currentServings}</div>
          </div>
        </div>

        <div class="recipe-section">
          <h3>
            Ingredients
            <div class="servings-control no-print">
              <button id="servings-down" ${currentServings <= 1 ? 'disabled' : ''}>&minus;</button>
              <span>${currentServings} serving${currentServings > 1 ? 's' : ''}</span>
              <button id="servings-up">+</button>
            </div>
          </h3>
          <ul class="ingredients-list">${ingredients}</ul>
        </div>

        <div class="recipe-section">
          <h3>Instructions</h3>
          <ol class="steps-list">${steps}</ol>
        </div>

        ${recipe.notes ? `
          <div class="recipe-section">
            <h3>Notes</h3>
            <div class="notes-block">${escapeHtml(recipe.notes)}</div>
          </div>
        ` : ''}

        ${tags ? `
          <div class="recipe-section">
            <h3>Tags</h3>
            <div class="tag-list">${tags}</div>
          </div>
        ` : ''}
      </div>
    `;

    // Bind detail actions
    $('#servings-down').onclick = () => { if (state.detailServings > 1) { state.detailServings--; renderDetail(); } };
    $('#servings-up').onclick = () => { state.detailServings++; renderDetail(); };
    $('#detail-edit').onclick = () => { closeModal('#detail-modal'); openRecipeForm(recipe); };
    $('#detail-delete').onclick = () => {
      if (confirm('Delete this recipe?')) {
        state.recipes = state.recipes.filter(r => r.id !== recipe.id);
        saveData();
        closeModal('#detail-modal');
        renderGrid();
      }
    };
    $('#detail-fav').onclick = () => toggleFavorite(recipe.id);
    $('#detail-print').onclick = () => window.print();
    $('#detail-cook').onclick = () => openCookMode(recipe);
  }

  // Cook mode
  function openCookMode(recipe) {
    state.cookRecipe = recipe;
    state.cookStep = 0;
    closeModal('#detail-modal');
    renderCookStep();
    $('#cook-mode').classList.add('open');
  }

  function renderCookStep() {
    const recipe = state.cookRecipe;
    if (!recipe) return;
    const steps = recipe.instructions.split('\n').filter(s => s.trim());
    $('#cook-title').textContent = recipe.title;
    $('#cook-step-num').textContent = `Step ${state.cookStep + 1} of ${steps.length}`;
    $('#cook-step-text').textContent = steps[state.cookStep] || '';
    $('#cook-progress-bar').style.width = `${((state.cookStep + 1) / steps.length) * 100}%`;
    $('#cook-prev').disabled = state.cookStep === 0;
    $('#cook-next').textContent = state.cookStep === steps.length - 1 ? 'Finish' : 'Next Step';
    resetTimer();
  }

  function closeCookMode() {
    $('#cook-mode').classList.remove('open');
    state.cookRecipe = null;
    resetTimer();
  }

  // Timer
  function startTimer() {
    if (state.timer.running) return;
    const mins = parseInt($('#timer-minutes').value) || 0;
    if (state.timer.remaining === 0) state.timer.remaining = mins * 60;
    if (state.timer.remaining === 0) return;
    state.timer.running = true;
    state.timer.interval = setInterval(() => {
      state.timer.remaining--;
      updateTimerDisplay();
      if (state.timer.remaining <= 0) {
        clearInterval(state.timer.interval);
        state.timer.running = false;
        try {
          const ctx = new (window.AudioContext || window.webkitAudioContext)();
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.frequency.value = 800;
          gain.gain.setValueAtTime(0.3, ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 1);
          osc.start();
          osc.stop(ctx.currentTime + 1);
        } catch(e) {}
        alert('Timer finished!');
      }
    }, 1000);
  }

  function resetTimer() {
    clearInterval(state.timer.interval);
    state.timer.interval = null;
    state.timer.remaining = 0;
    state.timer.running = false;
    updateTimerDisplay();
  }

  function updateTimerDisplay() {
    const s = state.timer.remaining;
    const mins = Math.floor(s / 60).toString().padStart(2, '0');
    const secs = (s % 60).toString().padStart(2, '0');
    $('#timer-display').textContent = `${mins}:${secs}`;
  }

  // Shopping list
  function openShoppingModal() {
    state.selectedShopping.clear();
    renderShoppingRecipes();
    $('#shopping-output').style.display = 'none';
    openModal('#shopping-modal');
  }

  function renderShoppingRecipes() {
    const container = $('#shopping-recipes');
    container.innerHTML = state.recipes.map(r => `
      <label class="shopping-item ${state.selectedShopping.has(r.id) ? 'selected' : ''}">
        <input type="checkbox" ${state.selectedShopping.has(r.id) ? 'checked' : ''} data-shop="${r.id}">
        ${escapeHtml(r.title)}
      </label>
    `).join('');
    container.querySelectorAll('[data-shop]').forEach(cb => {
      cb.onchange = () => {
        if (cb.checked) state.selectedShopping.add(cb.dataset.shop);
        else state.selectedShopping.delete(cb.dataset.shop);
        renderShoppingRecipes();
      };
    });
  }

  function generateShoppingList() {
    if (!state.selectedShopping.size) {
      alert('Select at least one recipe.');
      return;
    }
    const combined = {};
    state.selectedShopping.forEach(id => {
      const r = state.recipes.find(x => x.id === id);
      if (!r) return;
      r.ingredients.split('\n').filter(l => l.trim()).forEach(line => {
        const parsed = parseIngredient(line);
        if (!parsed) return;
        const key = parsed.rest.toLowerCase().trim();
        if (!combined[key]) {
          combined[key] = { qty: parsed.qty, rest: parsed.rest, count: 0 };
        } else if (parsed.qty != null && combined[key].qty != null) {
          combined[key].qty += parsed.qty;
        }
        combined[key].count++;
      });
    });

    const items = Object.values(combined).sort((a, b) => a.rest.localeCompare(b.rest));
    const listHtml = items.map((it, i) => {
      const qty = it.qty != null ? formatQty(it.qty) + ' ' : '';
      return `<li><input type="checkbox" data-sl="${i}"><span>${escapeHtml(qty + it.rest)}</span></li>`;
    }).join('');

    $('#shopping-list-display').innerHTML = `
      <h4>${items.length} items from ${state.selectedShopping.size} recipes</h4>
      <ul id="shopping-ul">${listHtml}</ul>
    `;
    $('#shopping-output').style.display = 'block';

    $('#shopping-ul').querySelectorAll('[data-sl]').forEach(cb => {
      cb.onchange = () => {
        cb.closest('li').classList.toggle('checked', cb.checked);
      };
    });
  }

  // Main render
  function renderAll() {
    renderCategoryTabs();
    renderGrid();
  }

  // Init
  function init() {
    loadData();
    renderAll();

    $('#add-recipe-btn').onclick = () => openRecipeForm();
    $('#shopping-btn').onclick = () => openShoppingModal();
    $('#search-input').oninput = e => { state.search = e.target.value; renderGrid(); };

    $('#fav-filter').onclick = e => {
      state.favoritesOnly = !state.favoritesOnly;
      e.currentTarget.classList.toggle('active', state.favoritesOnly);
      renderGrid();
    };

    $('#recipe-form').onsubmit = saveRecipe;

    $('#generate-shopping').onclick = generateShoppingList;

    // Cook mode
    $('#exit-cook').onclick = closeCookMode;
    $('#cook-prev').onclick = () => {
      if (state.cookStep > 0) { state.cookStep--; renderCookStep(); }
    };
    $('#cook-next').onclick = () => {
      if (!state.cookRecipe) return;
      const steps = state.cookRecipe.instructions.split('\n').filter(s => s.trim());
      if (state.cookStep < steps.length - 1) {
        state.cookStep++;
        renderCookStep();
      } else {
        closeCookMode();
      }
    };

    $('#start-timer').onclick = startTimer;
    $('#reset-timer').onclick = resetTimer;

    // Modal closing
    document.addEventListener('click', e => {
      if (e.target.matches('[data-close]') || e.target.closest('[data-close]')) {
        closeAllModals();
      }
      if (e.target.classList.contains('modal-backdrop')) {
        closeAllModals();
      }
    });

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') {
        closeAllModals();
        if ($('#cook-mode').classList.contains('open')) closeCookMode();
      }
    });
  }

  init();
})();
</script>
</body>
</html>
