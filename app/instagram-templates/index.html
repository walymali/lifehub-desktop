<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Story Templates Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #f5f5f3;
  --card: #fff;
  --heading: #1a1a1a;
  --text: #555;
  --accent: #1a1a1a;
  --border: #e8e8e6;
  --sidebar-w: 380px;
}

body {
  font-family: 'Sora', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ---- Top Bar ---- */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 32px;
  background: var(--card);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 100;
}
.topbar-brand {
  display: flex;
  align-items: center;
  gap: 10px;
}
.topbar-brand svg { width: 28px; height: 28px; }
.topbar-brand h1 {
  font-size: 16px;
  font-weight: 700;
  color: var(--heading);
  letter-spacing: -0.3px;
}
.topbar-brand span {
  font-size: 11px;
  font-weight: 500;
  color: #999;
  background: #f0f0ee;
  padding: 3px 8px;
  border-radius: 4px;
}
.topbar-actions { display: flex; gap: 8px; }
.topbar-actions button {
  font-family: 'Sora', sans-serif;
  font-size: 12px;
  font-weight: 600;
  padding: 8px 16px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--card);
  color: var(--heading);
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 6px;
}
.topbar-actions button:hover { background: #f0f0ee; }
.topbar-actions .btn-primary {
  background: var(--heading);
  color: #fff;
  border-color: var(--heading);
}
.topbar-actions .btn-primary:hover { background: #333; }
.topbar-actions .btn-gallery {
  background: transparent;
  border: 1px solid var(--border);
}

/* ---- Layout ---- */
.app-layout {
  display: flex;
  height: calc(100vh - 61px);
}

/* ---- Sidebar ---- */
.sidebar {
  width: var(--sidebar-w);
  min-width: var(--sidebar-w);
  background: var(--card);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  padding: 24px;
}
.sidebar::-webkit-scrollbar { width: 4px; }
.sidebar::-webkit-scrollbar-thumb { background: #ddd; border-radius: 4px; }

.sidebar-section {
  margin-bottom: 24px;
}
.sidebar-section h3 {
  font-size: 11px;
  font-weight: 700;
  color: #999;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 12px;
}

/* Template Picker */
.template-picker {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 8px;
}
.category-tab {
  font-family: 'Sora', sans-serif;
  font-size: 11px;
  font-weight: 500;
  padding: 6px 12px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text);
  cursor: pointer;
  transition: all 0.2s;
}
.category-tab.active {
  background: var(--heading);
  color: #fff;
  border-color: var(--heading);
}
.category-tab:hover:not(.active) { background: #f5f5f3; }

.template-list {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 6px;
  margin-top: 10px;
}
.template-thumb {
  aspect-ratio: 9/16;
  border-radius: 6px;
  border: 2px solid transparent;
  cursor: pointer;
  overflow: hidden;
  transition: all 0.2s;
  position: relative;
}
.template-thumb.active { border-color: var(--heading); }
.template-thumb:hover { transform: scale(1.05); }
.template-thumb-inner {
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 6px;
  font-weight: 600;
  color: #fff;
  text-align: center;
  padding: 4px;
  line-height: 1.2;
}

/* Input Groups */
.input-group {
  margin-bottom: 16px;
}
.input-group label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  color: var(--heading);
  margin-bottom: 6px;
}
.input-group input,
.input-group textarea,
.input-group select {
  width: 100%;
  font-family: 'Sora', sans-serif;
  font-size: 13px;
  padding: 10px 12px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: #fafaf9;
  color: var(--heading);
  outline: none;
  transition: border-color 0.2s;
}
.input-group input:focus,
.input-group textarea:focus {
  border-color: var(--heading);
}
.input-group textarea { resize: vertical; min-height: 60px; }

/* Color Palettes */
.palette-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 6px;
}
.palette-swatch {
  height: 40px;
  border-radius: 8px;
  cursor: pointer;
  border: 2px solid transparent;
  transition: all 0.2s;
  position: relative;
  overflow: hidden;
}
.palette-swatch.active {
  border-color: var(--heading);
  box-shadow: 0 0 0 2px rgba(26,26,26,0.15);
}
.palette-swatch:hover { transform: scale(1.05); }
.palette-swatch-colors {
  display: flex;
  height: 100%;
}
.palette-swatch-colors span { flex: 1; }

/* Background Type */
.bg-type-row {
  display: flex;
  gap: 4px;
  margin-bottom: 10px;
}
.bg-type-btn {
  flex: 1;
  font-family: 'Sora', sans-serif;
  font-size: 11px;
  font-weight: 600;
  padding: 8px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: transparent;
  color: var(--text);
  cursor: pointer;
  transition: all 0.2s;
}
.bg-type-btn.active {
  background: var(--heading);
  color: #fff;
  border-color: var(--heading);
}

/* Font Size Slider */
.slider-row {
  display: flex;
  align-items: center;
  gap: 10px;
}
.slider-row input[type="range"] {
  flex: 1;
  -webkit-appearance: none;
  height: 4px;
  background: var(--border);
  border-radius: 4px;
  border: none;
  padding: 0;
}
.slider-row input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 16px;
  height: 16px;
  background: var(--heading);
  border-radius: 50%;
  cursor: pointer;
}
.slider-row .slider-val {
  font-size: 12px;
  font-weight: 600;
  color: var(--heading);
  min-width: 32px;
  text-align: right;
}

/* ---- Preview Area ---- */
.preview-area {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 32px;
  background: var(--bg);
}

.phone-frame {
  width: 375px;
  height: 667px;
  border-radius: 40px;
  background: #000;
  padding: 12px;
  box-shadow:
    0 0 0 2px #333,
    0 20px 60px rgba(0,0,0,0.2),
    0 0 0 14px #1a1a1a;
  position: relative;
}
.phone-frame::before {
  content: '';
  position: absolute;
  top: 12px;
  left: 50%;
  transform: translateX(-50%);
  width: 120px;
  height: 28px;
  background: #000;
  border-radius: 14px;
  z-index: 10;
}
.phone-screen {
  width: 100%;
  height: 100%;
  border-radius: 30px;
  overflow: hidden;
  position: relative;
}
.story-canvas {
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
  text-align: center;
}

/* ---- Gallery Modal ---- */
.gallery-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(8px);
  z-index: 200;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 40px;
}
.gallery-overlay.open { display: flex; }
.gallery-modal {
  background: var(--card);
  border-radius: 20px;
  width: 100%;
  max-width: 1100px;
  max-height: 85vh;
  overflow-y: auto;
  padding: 32px;
}
.gallery-modal::-webkit-scrollbar { width: 4px; }
.gallery-modal::-webkit-scrollbar-thumb { background: #ddd; border-radius: 4px; }
.gallery-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 24px;
}
.gallery-header h2 {
  font-size: 20px;
  font-weight: 700;
  color: var(--heading);
}
.gallery-close {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: transparent;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  color: var(--heading);
  transition: background 0.2s;
}
.gallery-close:hover { background: #f0f0ee; }

.gallery-category {
  margin-bottom: 28px;
}
.gallery-category h3 {
  font-size: 13px;
  font-weight: 700;
  color: var(--heading);
  margin-bottom: 12px;
  text-transform: capitalize;
}
.gallery-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 12px;
}
.gallery-item {
  aspect-ratio: 9/16;
  border-radius: 12px;
  overflow: hidden;
  cursor: pointer;
  transition: all 0.25s;
  position: relative;
  border: 2px solid transparent;
}
.gallery-item:hover {
  transform: translateY(-4px);
  box-shadow: 0 12px 32px rgba(0,0,0,0.15);
}
.gallery-item.active { border-color: var(--heading); }
.gallery-item-inner {
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 12px;
  text-align: center;
}
.gallery-item-name {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(4px);
  color: #fff;
  font-size: 9px;
  font-weight: 600;
  padding: 6px;
  text-align: center;
}

/* Toast */
.toast {
  position: fixed;
  bottom: 32px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--heading);
  color: #fff;
  font-family: 'Sora', sans-serif;
  font-size: 13px;
  font-weight: 500;
  padding: 12px 24px;
  border-radius: 12px;
  z-index: 999;
  transition: transform 0.3s ease;
  white-space: nowrap;
}
.toast.show { transform: translateX(-50%) translateY(0); }

/* Utility */
.hidden { display: none !important; }
</style>
</head>
<body>

<!-- Top Bar -->
<div class="topbar">
  <div class="topbar-brand">

  <!-- Preview -->

</div>

<!-- Gallery Overlay -->
<div class="gallery-overlay" id="galleryOverlay">

      <h2>Template Gallery</h2>
      <button class="gallery-close" id="galleryClose">&times;</button>
    </div>
    <div id="galleryContent"></div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

// ========================================
// STATE
// ========================================
let state = {
  category: 'quotes',
  templateId: 'q1',
  headline: '',
  subtitle: '',
  body: '',
  paletteIdx: 0,
  bgType: 'gradient',
  bgColor: '#1a1a1a',
  grad1: '#667eea',
  grad2: '#764ba2',
  gradDir: 'to bottom',
  bgImage: '',
  headlineSize: 32,
  subtitleSize: 16,
  bodySize: 14,
};

function getTemplate(id) {
  for (const cat of Object.values(CATEGORIES)) {
    const t = cat.templates.find(t => t.id === id);
    if (t) return t;
  }
  return null;
}

function loadState() {
  try {
    const saved = localStorage.getItem('storyTemplateState');
    if (saved) {
      const parsed = JSON.parse(saved);
      Object.assign(state, parsed);
    }
  } catch(e) {}
}

function saveState() {
  localStorage.setItem('storyTemplateState', JSON.stringify(state));
}

// ========================================
// RENDERING
// ========================================
function renderCategoryTabs() {
  const el = document.getElementById('categoryTabs');
  el.innerHTML = '';
  for (const [key, cat] of Object.entries(CATEGORIES)) {
    const btn = document.createElement('button');
    btn.className = 'category-tab' + (state.category === key ? ' active' : '');
    btn.textContent = cat.label;
    btn.onclick = () => {
      state.category = key;
      state.templateId = cat.templates[0].id;
      applyTemplate(cat.templates[0]);
      renderCategoryTabs();
      renderTemplateList();
      saveState();
    };
    el.appendChild(btn);
  }
}

function renderTemplateList() {
  const el = document.getElementById('templateList');
  el.innerHTML = '';
  const templates = CATEGORIES[state.category].templates;
  templates.forEach(t => {
    const div = document.createElement('div');
    div.className = 'template-thumb' + (state.templateId === t.id ? ' active' : '');
    const pal = PALETTES[t.palette];
    const bg = t.bgType === 'gradient' ?
      `linear-gradient(${t.grad1}, ${t.grad2})` :
      (t.bgColor || pal.bg);
    div.innerHTML = `<div class="template-thumb-inner" style="background:${bg};color:${pal.primary}">${t.name}</div>`;
    div.onclick = () => {
      state.templateId = t.id;
      applyTemplate(t);
      renderTemplateList();
      saveState();
    };
    el.appendChild(div);
  });
}

function applyTemplate(t) {
  state.headline = t.headline;
  state.subtitle = t.subtitle;
  state.body = t.body;
  state.paletteIdx = t.palette;
  state.bgType = t.bgType;
  state.bgColor = t.bgColor || '#1a1a1a';
  state.grad1 = t.grad1 || '#667eea';
  state.grad2 = t.grad2 || '#764ba2';
  state.headlineSize = t.headlineSize || 32;
  state.subtitleSize = t.subtitleSize || 16;
  state.bodySize = t.bodySize || 14;
  syncEditorFields();
  renderPreview();
  renderPalettes();
  renderBgType();
}

function syncEditorFields() {
  document.getElementById('inputHeadline').value = state.headline;
  document.getElementById('inputSubtitle').value = state.subtitle;
  document.getElementById('inputBody').value = state.body;
  document.getElementById('inputBgColor').value = state.bgColor;
  document.getElementById('inputGrad1').value = state.grad1;
  document.getElementById('inputGrad2').value = state.grad2;
  document.getElementById('sliderHeadline').value = state.headlineSize;
  document.getElementById('sliderSubtitle').value = state.subtitleSize;
  document.getElementById('sliderBody').value = state.bodySize;
  document.getElementById('valHeadline').textContent = state.headlineSize + 'px';
  document.getElementById('valSubtitle').textContent = state.subtitleSize + 'px';
  document.getElementById('valBody').textContent = state.bodySize + 'px';
}

function renderPalettes() {
  const el = document.getElementById('paletteGrid');
  el.innerHTML = '';
  PALETTES.forEach((p, i) => {
    const div = document.createElement('div');
    div.className = 'palette-swatch' + (state.paletteIdx === i ? ' active' : '');
    div.innerHTML = `<div class="palette-swatch-colors">
      <span style="background:${p.bg}"></span>
      <span style="background:${p.accent}"></span>
      <span style="background:${p.primary}"></span>
    </div>`;
    div.title = p.name;
    div.onclick = () => {
      state.paletteIdx = i;
      renderPalettes();
      renderPreview();
      saveState();
    };
    el.appendChild(div);
  });
}

function renderBgType() {
  const types = ['solid','gradient','image'];
  const labels = ['Solid','Gradient','Image'];
  const row = document.getElementById('bgTypeRow');
  row.innerHTML = '';
  types.forEach((t, i) => {
    const btn = document.createElement('button');
    btn.className = 'bg-type-btn' + (state.bgType === t ? ' active' : '');
    btn.textContent = labels[i];
    btn.onclick = () => {
      state.bgType = t;
      renderBgType();
      renderPreview();
      saveState();
    };
    row.appendChild(btn);
  });
  document.getElementById('bgSolidGroup').classList.toggle('hidden', state.bgType !== 'solid');
  document.getElementById('bgGradientGroup').classList.toggle('hidden', state.bgType !== 'gradient');
  document.getElementById('bgImageGroup').classList.toggle('hidden', state.bgType !== 'image');
}

// ========================================
// PREVIEW RENDERING
// ========================================
function getStoryBackground() {
  const pal = PALETTES[state.paletteIdx];
  if (state.bgType === 'solid') return state.bgColor;
  if (state.bgType === 'gradient') return `linear-gradient(${state.gradDir}, ${state.grad1}, ${state.grad2})`;
  if (state.bgType === 'image' && state.bgImage) return `url(${state.bgImage}) center/cover no-repeat`;
  return pal.bg;
}

  const canvas = document.getElementById('storyCanvas');

// ========================================
// GALLERY
// ========================================
function renderGallery() {
  const el = document.getElementById('galleryContent');
  let html = '';
  for (const [key, cat] of Object.entries(CATEGORIES)) {
    html += `<div class="gallery-category"><h3>${cat.label}</h3><div class="gallery-grid">`;
    cat.templates.forEach(t => {
      const pal = PALETTES[t.palette];
      const bg = t.bgType === 'gradient' ?
        `linear-gradient(${t.grad1}, ${t.grad2})` :
        (t.bgColor || pal.bg);
      html += `<div class="gallery-item${state.templateId === t.id ? ' active' : ''}" data-id="${t.id}" data-cat="${key}" onclick="selectFromGallery('${t.id}','${key}')">
        <div class="gallery-item-inner" style="background:${bg};color:${pal.primary}">
          <div style="font-size:11px;font-weight:700;line-height:1.3;margin-bottom:4px">${t.headline}</div>
          ${t.subtitle ? `<div style="font-size:8px;opacity:0.7">${t.subtitle}</div>` : ''}
        </div>
        <div class="gallery-item-name">${t.name}</div>
      </div>`;
    });
    html += '</div></div>';
  }
  el.innerHTML = html;
}

function selectFromGallery(id, cat) {
  state.category = cat;
  state.templateId = id;
  const t = getTemplate(id);
  if (t) applyTemplate(t);
  renderCategoryTabs();
  renderTemplateList();
  saveState();
  document.getElementById('galleryOverlay').classList.remove('open');
}

// ========================================
// DOWNLOAD
// ========================================
function downloadAsImage() {
  const storyEl = document.getElementById('storyCanvas');
  const w = 1080;
  const h = 1920;
  const canvas = document.createElement('canvas');
  canvas.width = w;
  canvas.height = h;
  const ctx = canvas.getContext('2d');
  const pal = PALETTES[state.paletteIdx];

  // Background
  if (state.bgType === 'gradient') {
    let grd;
    if (state.gradDir === 'to bottom' || state.gradDir === '180deg') {
      grd = ctx.createLinearGradient(0, 0, 0, h);
    } else if (state.gradDir === 'to right') {
      grd = ctx.createLinearGradient(0, 0, w, 0);
    } else if (state.gradDir === 'to bottom right') {
      grd = ctx.createLinearGradient(0, 0, w, h);
    } else {
      grd = ctx.createLinearGradient(0, 0, w * 0.7, h);
    }
    grd.addColorStop(0, state.grad1);
    grd.addColorStop(1, state.grad2);
    ctx.fillStyle = grd;
    ctx.fillRect(0, 0, w, h);
  } else if (state.bgType === 'image' && state.bgImage) {
    ctx.fillStyle = state.bgColor || '#000';
    ctx.fillRect(0, 0, w, h);
  } else {
    ctx.fillStyle = state.bgColor || '#000';
    ctx.fillRect(0, 0, w, h);
  }

  // Text
  const scale = w / 351; // scale from preview to 1080
  const textColor = pal.primary;
  ctx.textAlign = 'center';

  let yPos = h * 0.42;
  if (state.headline) {
    ctx.font = `800 ${state.headlineSize * scale}px Sora, sans-serif`;
    ctx.fillStyle = textColor;
    wrapText(ctx, state.headline, w / 2, yPos, w * 0.8, state.headlineSize * scale * 1.2);
    yPos += state.headlineSize * scale * 1.5;
  }
  if (state.subtitle) {
    ctx.font = `500 ${state.subtitleSize * scale}px Sora, sans-serif`;
    ctx.fillStyle = pal.secondary || 'rgba(255,255,255,0.7)';
    ctx.fillText(state.subtitle, w / 2, yPos);
    yPos += state.subtitleSize * scale * 2;
  }
  if (state.body) {
    ctx.font = `400 ${state.bodySize * scale}px Sora, sans-serif`;
    ctx.fillStyle = pal.secondary || 'rgba(255,255,255,0.6)';
    const bodyLines = state.body.split('\n');
    bodyLines.forEach(line => {
      ctx.fillText(line, w / 2, yPos);
      yPos += state.bodySize * scale * 1.8;
    });
  }

  const link = document.createElement('a');
  link.download = `story-${state.templateId}-${Date.now()}.png`;
  link.href = canvas.toDataURL('image/png');
  link.click();
  showToast('Image downloaded successfully!');
}

function wrapText(ctx, text, x, y, maxWidth, lineHeight) {
  const words = text.split(' ');
  let line = '';
  for (let n = 0; n < words.length; n++) {
    const testLine = line + words[n] + ' ';
    const metrics = ctx.measureText(testLine);
    if (metrics.width > maxWidth && n > 0) {
      ctx.fillText(line.trim(), x, y);
      line = words[n] + ' ';
      y += lineHeight;
    } else {
      line = testLine;
    }
  }
  ctx.fillText(line.trim(), x, y);
}

// ========================================
// COPY CSS
// ========================================
function copyCSSToClipboard() {
  const pal = PALETTES[state.paletteIdx];
  let bgCSS = '';
  if (state.bgType === 'solid') bgCSS = `background-color: ${state.bgColor};`;
  else if (state.bgType === 'gradient') bgCSS = `background: linear-gradient(${state.gradDir}, ${state.grad1}, ${state.grad2});`;
  else if (state.bgType === 'image') bgCSS = `background: url('${state.bgImage}') center/cover no-repeat;`;

  const css = `.story-template {
  width: 1080px;
  height: 1920px;
  ${bgCSS}
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  font-family: 'Sora', sans-serif;
  padding: 80px 60px;
}

.story-headline {
  font-size: ${Math.round(state.headlineSize * (1080/351))}px;
  font-weight: 800;
  color: ${pal.primary};
  line-height: 1.15;
  letter-spacing: -1px;
}

.story-subtitle {
  font-size: ${Math.round(state.subtitleSize * (1080/351))}px;
  font-weight: 500;
  color: ${pal.secondary};
  margin-top: 24px;
}

.story-body {
  font-size: ${Math.round(state.bodySize * (1080/351))}px;
  font-weight: 400;
  color: ${pal.secondary};
  margin-top: 32px;
  line-height: 1.6;
}`;

  navigator.clipboard.writeText(css).then(() => {
    showToast('CSS copied to clipboard!');
  }).catch(() => {
    showToast('Failed to copy CSS');
  });
}

// ========================================
// TOAST
// ========================================
function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2500);
}

// ========================================
// EVENT BINDINGS
// ========================================
function bindEditorEvents() {
  // Text fields
  document.getElementById('inputHeadline').addEventListener('input', e => {
    state.headline = e.target.value;
    renderPreview();
    saveState();
  });
  document.getElementById('inputSubtitle').addEventListener('input', e => {
    state.subtitle = e.target.value;
    renderPreview();
    saveState();
  });
  document.getElementById('inputBody').addEventListener('input', e => {
    state.body = e.target.value;
    renderPreview();
    saveState();
  });

  // Background
  document.getElementById('inputBgColor').addEventListener('input', e => {
    state.bgColor = e.target.value;
    renderPreview();
    saveState();
  });
  document.getElementById('inputGrad1').addEventListener('input', e => {
    state.grad1 = e.target.value;
    renderPreview();
    saveState();
  });
  document.getElementById('inputGrad2').addEventListener('input', e => {
    state.grad2 = e.target.value;
    renderPreview();
    saveState();
  });
  document.getElementById('inputGradDir').addEventListener('change', e => {
    state.gradDir = e.target.value;
    renderPreview();
    saveState();
  });
  document.getElementById('inputBgImage').addEventListener('input', e => {
    state.bgImage = e.target.value;
    renderPreview();
    saveState();
  });

  // Font size sliders
  document.getElementById('sliderHeadline').addEventListener('input', e => {
    state.headlineSize = parseInt(e.target.value);
    document.getElementById('valHeadline').textContent = state.headlineSize + 'px';
    renderPreview();
    saveState();
  });
  document.getElementById('sliderSubtitle').addEventListener('input', e => {
    state.subtitleSize = parseInt(e.target.value);
    document.getElementById('valSubtitle').textContent = state.subtitleSize + 'px';
    renderPreview();
    saveState();
  });
  document.getElementById('sliderBody').addEventListener('input', e => {
    state.bodySize = parseInt(e.target.value);
    document.getElementById('valBody').textContent = state.bodySize + 'px';
    renderPreview();
    saveState();
  });

  // Top bar buttons
  document.getElementById('btnDownload').addEventListener('click', downloadAsImage);
  document.getElementById('btnCopyCSS').addEventListener('click', copyCSSToClipboard);

  // Gallery
  document.getElementById('btnGallery').addEventListener('click', () => {
    renderGallery();
    document.getElementById('galleryOverlay').classList.add('open');
  });
  document.getElementById('galleryClose').addEventListener('click', () => {
    document.getElementById('galleryOverlay').classList.remove('open');
  });
  document.getElementById('galleryOverlay').addEventListener('click', e => {
    if (e.target === e.currentTarget) {
      document.getElementById('galleryOverlay').classList.remove('open');
    }
  });
}

// ========================================
// INIT
// ========================================
function init() {
  loadState();
  renderCategoryTabs();
  renderTemplateList();
  renderPalettes();
  renderBgType();
  syncEditorFields();
  renderPreview();
  bindEditorEvents();
}

window.selectFromGallery = selectFromGallery;
document.addEventListener('DOMContentLoaded', init);
</script>
