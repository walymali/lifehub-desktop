<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wireframe Kit -- Watermelons Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Sora', sans-serif;
    background: #f5f5f3;
    color: #1a1a1a;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  /* ---- Header ---- */
  .site-header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(245,245,243,.85);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-bottom: 1px solid #e0e0de;
  }
  .site-header-inner {
    max-width: 1320px;
    margin: 0 auto;
    padding: 20px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .site-logo {
    font-weight: 700;
    font-size: 20px;
    letter-spacing: -.4px;
    color: #1a1a1a;
  }
  .site-logo span { color: #999; font-weight: 400; }
  .site-count {
    font-size: 13px;
    color: #888;
    font-weight: 400;
  }

  /* ---- Filter Nav ---- */
  .filter-bar {
    max-width: 1320px;
    margin: 0 auto;
    padding: 16px 40px 0;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .filter-btn {
    padding: 7px 18px;
    border-radius: 100px;
    border: 1px solid #d5d5d3;
    background: #fff;
    font-family: 'Sora', sans-serif;
    font-size: 13px;
    font-weight: 500;
    color: #555;
    cursor: pointer;
    transition: all .2s;
  }
  .filter-btn:hover { border-color: #1a1a1a; color: #1a1a1a; }
  .filter-btn.active { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }

  /* ---- Grid ---- */
  .kit-grid {
    max-width: 1320px;
    margin: 0 auto;
    padding: 32px 40px 80px;
    display: grid;
    grid-template-columns: 1fr;
    gap: 28px;
  }

  /* ---- Component Card ---- */
  .comp-card {
    background: #fff;
    border-radius: 16px;
    border: 1px solid #e8e8e6;
    overflow: hidden;
    transition: box-shadow .25s;
  }
  .comp-card:hover { box-shadow: 0 8px 30px rgba(0,0,0,.06); }

  .comp-card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 24px;
    border-bottom: 1px solid #f0f0ee;
  }
  .comp-card-title {
    font-size: 14px;
    font-weight: 600;
    color: #1a1a1a;
    letter-spacing: -.2px;
  }
  .comp-card-tag {
    font-size: 11px;
    font-weight: 500;
    color: #999;
    background: #f5f5f3;
    padding: 3px 10px;
    border-radius: 100px;
    margin-left: 10px;
  }
  .copy-btn {
    padding: 7px 16px;
    border-radius: 8px;
    border: 1px solid #d5d5d3;
    background: #fff;
    font-family: 'Sora', sans-serif;
    font-size: 12px;
    font-weight: 500;
    color: #555;
    cursor: pointer;
    transition: all .2s;
    white-space: nowrap;
  }
  .copy-btn:hover { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
  .copy-btn.copied { background: #2d8a4e; color: #fff; border-color: #2d8a4e; }

  .comp-card-preview {
    padding: 32px 24px;
    background: #fafaf9;
    min-height: 120px;
  }

  /* ---- Wireframe Base Styles ---- */
  .wf { font-family: 'Sora', sans-serif; }
  .wf-bg { background: #eee; }
  .wf-border { border: 1.5px solid #d0d0d0; }
  .wf-border-dashed { border: 1.5px dashed #ccc; }
  .wf-text { color: #999; font-size: 13px; }
  .wf-text-sm { color: #bbb; font-size: 11px; }
  .wf-text-heading { color: #666; font-weight: 600; }
  .wf-line {
    height: 8px;
    background: #ddd;
    border-radius: 4px;
    margin: 6px 0;
  }
  .wf-line-sm {
    height: 6px;
    background: #e2e2e2;
    border-radius: 3px;
    margin: 4px 0;
  }
  .wf-circle {
    width: 44px; height: 44px;
    border-radius: 50%;
    background: #ddd;
    flex-shrink: 0;
  }
  .wf-circle-sm {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: #ddd;
    flex-shrink: 0;
  }
  .wf-box {
    background: #e8e8e6;
    border-radius: 8px;
  }
  .wf-btn {
    display: inline-block;
    padding: 10px 28px;
    border: 1.5px solid #bbb;
    border-radius: 8px;
    color: #888;
    font-size: 12px;
    font-weight: 500;
    text-align: center;
  }
  .wf-btn-filled {
    display: inline-block;
    padding: 10px 28px;
    background: #ccc;
    border-radius: 8px;
    color: #777;
    font-size: 12px;
    font-weight: 500;
    text-align: center;
  }
  .wf-input {
    width: 100%;
    padding: 10px 14px;
    border: 1.5px solid #d5d5d3;
    border-radius: 8px;
    background: #fafafa;
    color: #bbb;
    font-size: 12px;
    font-family: 'Sora', sans-serif;
  }
  .wf-img-placeholder {
    background: #e5e5e3;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #bbb;
    font-size: 12px;
    overflow: hidden;
  }
  .wf-icon-placeholder {
    width: 40px; height: 40px;
    background: #e0e0de;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .wf-divider {
    height: 1px;
    background: #e5e5e3;
    margin: 16px 0;
  }

  /* ---- Toast ---- */
  .toast {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: #1a1a1a;
    color: #fff;
    padding: 12px 28px;
    border-radius: 12px;
    font-size: 13px;
    font-weight: 500;
    opacity: 0;
    pointer-events: none;
    transition: all .35s cubic-bezier(.4,0,.2,1);
    z-index: 9999;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  @media (max-width: 768px) {
    .site-header-inner, .filter-bar, .kit-grid { padding-left: 20px; padding-right: 20px; }
  }
</style>
</head>
<body>

<!-- Header -->
<header class="site-header">
  <div class="site-header-inner">
    <div>
      <div class="site-logo">Wireframe Kit <span>by Watermelons Studio</span></div>
    </div>
    <div class="site-count" id="componentCount"></div>
  </div>
</header>

<!-- Filter Bar -->
<nav class="filter-bar" id="filterBar">
  <button class="filter-btn active" data-filter="all">All</button>
  <button class="filter-btn" data-filter="hero">Hero</button>
  <button class="filter-btn" data-filter="nav">Navigation</button>
  <button class="filter-btn" data-filter="features">Features</button>
  <button class="filter-btn" data-filter="pricing">Pricing</button>
  <button class="filter-btn" data-filter="testimonials">Testimonials</button>
  <button class="filter-btn" data-filter="footer">Footer</button>
  <button class="filter-btn" data-filter="forms">Forms</button>
  <button class="filter-btn" data-filter="cards">Cards</button>
  <button class="filter-btn" data-filter="cta">CTA</button>

<!-- Grid -->
<main class="kit-grid" id="kitGrid"></main>

<!-- Toast -->
<div class="toast" id="toast">Copied to clipboard</div>

/* ================================================================
   Render & Interactions
================================================================ */
const grid = document.getElementById('kitGrid');
const toast = document.getElementById('toast');
const countEl = document.getElementById('componentCount');
let toastTimer;

function renderCards(filter) {
  const filtered = filter === 'all' ? components : components.filter(c => c.category === filter);
  countEl.textContent = filtered.length + ' components';

  grid.innerHTML = filtered.map(comp => `
    <article class="comp-card" data-category="${comp.category}">
      <div class="comp-card-header">
        <div style="display:flex;align-items:center">
          <span class="comp-card-title">${comp.title}</span>
          <span class="comp-card-tag">${comp.tag}</span>
        </div>
        <button class="copy-btn" data-id="${comp.id}">Copy HTML</button>
      </div>
      <div class="comp-card-preview">${comp.html}</div>
    </article>
  `).join('');
}

// Initial render
renderCards('all');

// Filter
document.getElementById('filterBar').addEventListener('click', e => {
  if (!e.target.classList.contains('filter-btn')) return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  e.target.classList.add('active');
  renderCards(e.target.dataset.filter);
});

// Copy
grid.addEventListener('click', e => {
  const btn = e.target.closest('.copy-btn');
  if (!btn) return;
  const comp = components.find(c => c.id === btn.dataset.id);
  if (!comp) return;

  // Clean up the HTML for copying (trim lines, normalise whitespace)
  const clean = comp.html.replace(/\n\s+/g, '\n').trim();

  navigator.clipboard.writeText(clean).then(() => {
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => {
      toast.classList.remove('show');
      btn.textContent = 'Copy HTML';
      btn.classList.remove('copied');
    }, 1800);
  });
});
</script>
