<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTube Thumbnail Kit</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #f5f5f3;
  --card: #fff;
  --heading: #1a1a1a;
  --text: #555;
  --accent: #e63946;
  --accent-light: #fce4e6;
  --border: #e8e8e6;
  --sidebar-w: 380px;
  --radius: 10px;
}

html { font-size: 14px; }

body {
  font-family: 'Sora', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ---- Top Bar ---- */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 28px;
  background: var(--card);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 100;
}
.topbar h1 {
  font-size: 1.15rem;
  font-weight: 700;
  color: var(--heading);
  letter-spacing: -0.3px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.topbar h1 span { color: var(--accent); }
.topbar-actions { display: flex; gap: 10px; }

/* ---- Layout ---- */
.app {
  display: flex;
  height: calc(100vh - 53px);
}

/* ---- Sidebar ---- */
.sidebar {
  width: var(--sidebar-w);
  min-width: var(--sidebar-w);
  background: var(--card);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.sidebar::-webkit-scrollbar { width: 5px; }
.sidebar::-webkit-scrollbar-thumb { background: #d4d4d2; border-radius: 4px; }

.section-label {
  font-size: .7rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1.2px;
  color: #aaa;
  margin: 14px 0 6px;
}
.section-label:first-child { margin-top: 0; }

.field { margin-bottom: 12px; }
.field label {
  display: block;
  font-size: .78rem;
  font-weight: 500;
  color: var(--heading);
  margin-bottom: 5px;
}

input[type="text"],
input[type="url"],
input[type="number"],
textarea,
select {
  width: 100%;
  padding: 9px 12px;
  border: 1.5px solid var(--border);
  border-radius: 7px;
  font-family: 'Sora', sans-serif;
  font-size: .82rem;
  color: var(--heading);
  background: #fafaf9;
  outline: none;
  transition: border .2s;
}
input:focus, textarea:focus, select:focus { border-color: var(--accent); }
textarea { resize: vertical; min-height: 56px; }

input[type="color"] {
  -webkit-appearance: none;
  border: 1.5px solid var(--border);
  border-radius: 7px;
  width: 40px;
  height: 34px;
  padding: 2px;
  cursor: pointer;
  background: #fafaf9;
}
input[type="color"]::-webkit-color-swatch-wrapper { padding: 2px; }
input[type="color"]::-webkit-color-swatch { border: none; border-radius: 4px; }

.row { display: flex; gap: 10px; align-items: flex-end; }
.row > .field { flex: 1; }
.row > .field.sm { flex: 0 0 auto; }

/* Range slider */
input[type="range"] {
  width: 100%;
  -webkit-appearance: none;
  height: 5px;
  border-radius: 4px;
  background: #e2e2e0;
  outline: none;
}
input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 16px; height: 16px;
  border-radius: 50%;
  background: var(--accent);
  cursor: pointer;
  border: 2px solid #fff;
  box-shadow: 0 1px 4px rgba(0,0,0,.15);
}
.range-row {
  display: flex;
  align-items: center;
  gap: 10px;
}
.range-row input[type="range"] { flex: 1; }
.range-val {
  font-size: .75rem;
  font-weight: 600;
  color: var(--heading);
  min-width: 32px;
  text-align: right;
}

/* Toggle */
.toggle-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 4px 0;
}
.toggle-row label { margin-bottom: 0; }
.toggle {
  position: relative;
  width: 40px; height: 22px;
  cursor: pointer;
}
.toggle input { opacity: 0; width: 0; height: 0; }
.toggle .slider {
  position: absolute; inset: 0;
  background: #d4d4d2;
  border-radius: 22px;
  transition: .25s;
}
.toggle .slider::before {
  content: '';
  position: absolute;
  width: 16px; height: 16px;
  left: 3px; top: 3px;
  background: #fff;
  border-radius: 50%;
  transition: .25s;
}
.toggle input:checked + .slider { background: var(--accent); }
.toggle input:checked + .slider::before { transform: translateX(18px); }

/* Template grid */
.tpl-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 6px;
}
.tpl-btn {
  padding: 8px 6px;
  border: 1.5px solid var(--border);
  border-radius: 7px;
  background: #fafaf9;
  cursor: pointer;
  text-align: center;
  font-family: 'Sora', sans-serif;
  font-size: .72rem;
  font-weight: 500;
  color: var(--heading);
  transition: .2s;
}
.tpl-btn:hover { border-color: var(--accent); background: var(--accent-light); }
.tpl-btn.active { border-color: var(--accent); background: var(--accent-light); color: var(--accent); }
.tpl-icon { font-size: 1.1rem; display: block; margin-bottom: 2px; }

/* Emoji picker */
.emoji-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
}
.emoji-btn {
  width: 34px; height: 34px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.15rem;
  border: 1.5px solid var(--border);
  border-radius: 6px;
  background: #fafaf9;
  cursor: pointer;
  transition: .2s;
}
.emoji-btn:hover { border-color: var(--accent); transform: scale(1.12); }
.emoji-btn.active { border-color: var(--accent); background: var(--accent-light); }

/* Border opts */
.border-opts {
  display: flex;
  gap: 6px;
}
.border-opt {
  flex: 1;
  padding: 7px 4px;
  border: 1.5px solid var(--border);
  border-radius: 7px;
  background: #fafaf9;
  cursor: pointer;
  text-align: center;
  font-family: 'Sora', sans-serif;
  font-size: .7rem;
  font-weight: 500;
  color: var(--heading);
  transition: .2s;
}
.border-opt:hover { border-color: var(--accent); }
.border-opt.active { border-color: var(--accent); background: var(--accent-light); color: var(--accent); }

/* Palette */
.palette-section { margin-top: 4px; }
.palette-row {
  display: flex;
  gap: 4px;
  margin-bottom: 6px;
  align-items: center;
}
.palette-name {
  font-size: .68rem;
  font-weight: 500;
  color: #999;
  min-width: 60px;
}
.palette-swatch {
  width: 24px; height: 24px;
  border-radius: 5px;
  cursor: pointer;
  border: 1.5px solid transparent;
  transition: .2s;
}
.palette-swatch:hover { transform: scale(1.15); border-color: var(--heading); }

/* Buttons */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 10px 18px;
  border: none;
  border-radius: 8px;
  font-family: 'Sora', sans-serif;
  font-size: .8rem;
  font-weight: 600;
  cursor: pointer;
  transition: .2s;
}
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: #cf2f3d; }
.btn-outline {
  background: transparent;
  color: var(--heading);
  border: 1.5px solid var(--border);
}
.btn-outline:hover { border-color: var(--accent); color: var(--accent); }
.btn-sm { padding: 7px 14px; font-size: .74rem; }
.btn-full { width: 100%; }

/* ---- Preview Area ---- */
.preview-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 30px;
  gap: 18px;
  overflow: auto;
}
.preview-wrapper {
  width: 100%;
  max-width: 780px;
  aspect-ratio: 1280 / 720;
  border-radius: 10px;
  overflow: hidden;
  box-shadow: 0 8px 40px rgba(0,0,0,.08), 0 1px 4px rgba(0,0,0,.04);
  position: relative;
}
.preview-canvas {
  width: 100%;
  height: 100%;
  display: block;
}
.preview-info {
  display: flex;
  align-items: center;
  gap: 16px;
  font-size: .72rem;
  color: #aaa;
}
.preview-info span { font-weight: 600; color: var(--heading); }

/* ---- Notification ---- */
.toast {
  position: fixed;
  bottom: 24px;
  right: 24px;
  background: var(--heading);
  color: #fff;
  padding: 12px 22px;
  border-radius: 9px;
  font-size: .8rem;
  font-weight: 500;
  transform: translateY(80px);
  opacity: 0;
  transition: .3s;
  z-index: 999;
}
.toast.show { transform: translateY(0); opacity: 1; }
</style>
</head>
<body>

<div class="topbar">
  <h1><span>&#9654;</span> Thumbnail Kit</h1>
  <div class="topbar-actions">
    <button class="btn btn-outline btn-sm" onclick="resetAll()">Reset</button>
    <button class="btn btn-primary btn-sm" onclick="downloadPNG()">Download PNG</button>
  </div>
</div>

<div class="app">
  <!-- ---- SIDEBAR ---- -->
  <aside class="sidebar" id="sidebar">

    <!-- Templates -->
    <div class="section-label">Templates</div>
    <div class="tpl-grid" id="tplGrid"></div>

    <!-- Text -->
    <div class="section-label">Headline</div>
    <div class="field">
      <textarea id="headline" rows="2" placeholder="YOUR HEADLINE HERE">YOUR HEADLINE HERE</textarea>
    </div>
    <div class="field">
      <label>Subtitle</label>
      <input type="text" id="subtitle" placeholder="Optional subtitle text">
    </div>

    <!-- Text Style -->
    <div class="section-label">Text Style</div>
    <div class="field">
      <label>Font Size</label>
      <div class="range-row">
        <input type="range" id="fontSize" min="24" max="120" value="64">
        <span class="range-val" id="fontSizeVal">64</span>
      </div>
    </div>
    <div class="field">
      <label>Subtitle Size</label>
      <div class="range-row">
        <input type="range" id="subSize" min="14" max="60" value="28">
        <span class="range-val" id="subSizeVal">28</span>
      </div>
    </div>
    <div class="row">
      <div class="field">
        <label>Text Color</label>
        <input type="color" id="textColor" value="#ffffff">
      </div>
      <div class="field">
        <label>Subtitle Color</label>
        <input type="color" id="subColor" value="#ffffff">
      </div>
    </div>
    <div class="toggle-row">
      <label>Text Shadow</label>
      <label class="toggle"><input type="checkbox" id="textShadow" checked><span class="slider"></span></label>
    </div>
    <div class="toggle-row">
      <label>Bold Headline</label>
      <label class="toggle"><input type="checkbox" id="boldText" checked><span class="slider"></span></label>
    </div>
    <div class="field">
      <label>Text Position</label>
      <select id="textPos">
        <option value="top">Top</option>
        <option value="center" selected>Center</option>
        <option value="bottom">Bottom</option>
      </select>
    </div>

    <!-- Background -->
    <div class="section-label">Background</div>
    <div class="field">
      <label>Type</label>
      <select id="bgType">
        <option value="solid">Solid Color</option>
        <option value="gradient" selected>Gradient</option>
        <option value="image">Image URL</option>
      </select>
    </div>
    <div class="row" id="bgColorRow">
      <div class="field">
        <label>Color 1</label>
        <input type="color" id="bgColor1" value="#1a1a2e">
      </div>
      <div class="field">
        <label>Color 2</label>
        <input type="color" id="bgColor2" value="#e63946">
      </div>
    </div>
    <div class="field" id="bgImageRow" style="display:none">
      <label>Image URL</label>
      <input type="url" id="bgImage" placeholder="https://example.com/image.jpg">
    </div>
    <div class="field" id="bgDimRow">
      <label>Background Dim</label>
      <div class="range-row">
        <input type="range" id="bgDim" min="0" max="80" value="30">
        <span class="range-val" id="bgDimVal">30%</span>
      </div>
    </div>

    <!-- Emoji -->
    <div class="section-label">Emoji Overlay</div>
    <div class="emoji-grid" id="emojiGrid"></div>
    <div class="field" style="margin-top:8px">
      <label>Emoji Size</label>
      <div class="range-row">
        <input type="range" id="emojiSize" min="40" max="200" value="80">
        <span class="range-val" id="emojiSizeVal">80</span>
      </div>
    </div>

    <!-- Border -->
    <div class="section-label">Border / Frame</div>
    <div class="border-opts" id="borderOpts"></div>
    <div class="row" style="margin-top:8px">
      <div class="field">
        <label>Border Color</label>
        <input type="color" id="borderColor" value="#e63946">
      </div>
    </div>

    <!-- Palette -->
    <div class="section-label">High-CTR Palettes</div>
    <div class="palette-section" id="paletteSection"></div>

    <!-- Save / Load -->
    <div class="section-label">Saved Designs</div>
    <div class="row" style="margin-bottom:8px">
      <div class="field" style="flex:1">
        <input type="text" id="saveName" placeholder="Design name">
      </div>
      <button class="btn btn-primary btn-sm" onclick="saveDesign()">Save</button>
    </div>
    <div id="savedList"></div>

    <div style="height:30px"></div>
  </aside>

  <!-- ---- PREVIEW ---- -->
  <main class="preview-area">
    <div class="preview-wrapper" id="previewWrapper">
      <canvas id="canvas" class="preview-canvas" width="1280" height="720"></canvas>
    </div>
    <div class="preview-info">
      <div>Resolution: <span>1280 x 720</span></div>
      <div>Aspect: <span>16:9</span></div>
    </div>
  </main>
</div>

<div class="toast" id="toast"></div>

<script>
// ===== State =====
const S = {
  headline: 'YOUR HEADLINE HERE',
  subtitle: '',
  fontSize: 64,
  subSize: 28,
  textColor: '#ffffff',
  subColor: '#ffffff',
  textShadow: true,
  boldText: true,
  textPos: 'center',
  bgType: 'gradient',
  bgColor1: '#1a1a2e',
  bgColor2: '#e63946',
  bgImage: '',
  bgDim: 30,
  emoji: '',
  emojiSize: 80,
  borderStyle: 'none',
  borderColor: '#e63946',
  template: ''
};

// ===== Templates =====
const TEMPLATES = [
  { id:'gaming',    icon:'&#127918;', name:'Gaming',      bg1:'#0f0c29', bg2:'#302b63', textColor:'#00ff88', headline:'EPIC GAMEPLAY',  subtitle:'Watch Now',     fontSize:72, bold:true, shadow:true, pos:'bottom', emoji:'&#127918;' },
  { id:'tutorial',  icon:'&#128218;', name:'Tutorial',    bg1:'#2193b0', bg2:'#6dd5ed', textColor:'#ffffff', headline:'HOW TO...',      subtitle:'Step by Step',  fontSize:60, bold:true, shadow:true, pos:'center', emoji:'&#128161;' },
  { id:'vlog',      icon:'&#127909;', name:'Vlog',        bg1:'#ee9ca7', bg2:'#ffdde1', textColor:'#1a1a1a', headline:'MY DAY',         subtitle:'Come along',    fontSize:58, bold:true, shadow:false,pos:'bottom', emoji:'&#10024;' },
  { id:'review',    icon:'&#11088;',  name:'Review',      bg1:'#f12711', bg2:'#f5af19', textColor:'#ffffff', headline:'HONEST REVIEW',  subtitle:'Worth it?',     fontSize:64, bold:true, shadow:true, pos:'center', emoji:'&#11088;' },
  { id:'top10',     icon:'&#128293;', name:'Top 10',      bg1:'#e63946', bg2:'#1d3557', textColor:'#ffffff', headline:'TOP 10',         subtitle:'You Won\'t Believe #1', fontSize:80, bold:true, shadow:true, pos:'center', emoji:'&#128293;' },
  { id:'beforeaft', icon:'&#9194;',   name:'Before/After',bg1:'#141e30', bg2:'#243b55', textColor:'#ffffff', headline:'TRANSFORMATION', subtitle:'Before vs After', fontSize:56, bold:true, shadow:true, pos:'top',    emoji:'&#10145;' },
  { id:'reaction',  icon:'&#128562;', name:'Reaction',    bg1:'#fc4a1a', bg2:'#f7b733', textColor:'#ffffff', headline:'OMG!!!',         subtitle:'Reaction Video', fontSize:76, bold:true, shadow:true, pos:'center', emoji:'&#128562;' },
  { id:'news',      icon:'&#128240;', name:'News',        bg1:'#1a1a2e', bg2:'#16213e', textColor:'#ffffff', headline:'BREAKING NEWS',  subtitle:'Full Story',    fontSize:62, bold:true, shadow:true, pos:'top',    emoji:'&#128680;' },
  { id:'podcast',   icon:'&#127897;', name:'Podcast',     bg1:'#0f2027', bg2:'#2c5364', textColor:'#e0e0e0', headline:'EPISODE 01',     subtitle:'Special Guest',  fontSize:54, bold:false,shadow:true, pos:'center', emoji:'&#127897;' },
  { id:'motivate',  icon:'&#128170;', name:'Motivational',bg1:'#232526', bg2:'#414345', textColor:'#ffd700', headline:'NEVER GIVE UP',  subtitle:'Motivation',    fontSize:68, bold:true, shadow:true, pos:'center', emoji:'&#128170;' }
];

// ===== Emojis =====
const EMOJIS = ['&#128293;','&#128640;','&#11088;','&#128161;','&#128170;','&#127918;','&#128562;','&#10024;','&#127775;','&#128680;','&#127897;','&#128240;','&#10145;','&#9889;','&#128308;','&#128994;','&#129395;','&#128142;','&#127942;','&#128276;'];

// ===== Borders =====
const BORDERS = [
  { id:'none',    label:'None' },
  { id:'thin',    label:'Thin' },
  { id:'thick',   label:'Thick' },
  { id:'rounded', label:'Rounded' }
];

// ===== Palettes =====
const PALETTES = [
  { name:'Fire',    colors:['#e63946','#f1faee','#a8dadc','#457b9d','#1d3557'] },
  { name:'Neon',    colors:['#f72585','#7209b7','#3a0ca3','#4361ee','#4cc9f0'] },
  { name:'Sunset',  colors:['#ff6b35','#f7c59f','#efefd0','#004e89','#1a659e'] },
  { name:'Bold',    colors:['#ffbe0b','#fb5607','#ff006e','#8338ec','#3a86ff'] },
  { name:'Dark',    colors:['#10002b','#240046','#3c096c','#5a189a','#7b2cbf'] },
  { name:'Fresh',   colors:['#06d6a0','#1b9aaa','#ef476f','#ffd166','#073b4c'] }
];

// ===== DOM refs =====
const $ = id => document.getElementById(id);
const canvas = $('canvas');
const ctx = canvas.getContext('2d');
let bgImg = null;
let bgImgLoaded = false;

// ===== Init =====
function init() {
  buildTemplates();
  buildEmojis();
  buildBorders();
  buildPalettes();
  bindInputs();
  loadSavedList();
  render();
}

function buildTemplates() {
  const g = $('tplGrid');
  g.innerHTML = TEMPLATES.map(t =>
    `<button class="tpl-btn" data-id="${t.id}"><span class="tpl-icon">${t.icon}</span>${t.name}</button>`
  ).join('');
  g.addEventListener('click', e => {
    const btn = e.target.closest('.tpl-btn');
    if (!btn) return;
    applyTemplate(btn.dataset.id);
  });
}

function buildEmojis() {
  const g = $('emojiGrid');
  g.innerHTML = EMOJIS.map(e =>
    `<button class="emoji-btn" data-emoji="${e}">${e}</button>`
  ).join('');
  g.addEventListener('click', e => {
    const btn = e.target.closest('.emoji-btn');
    if (!btn) return;
    const em = btn.dataset.emoji;
    S.emoji = S.emoji === em ? '' : em;
    g.querySelectorAll('.emoji-btn').forEach(b => b.classList.toggle('active', b.dataset.emoji === S.emoji));
    render();
  });
}

function buildBorders() {
  const g = $('borderOpts');
  g.innerHTML = BORDERS.map(b =>
    `<button class="border-opt${b.id==='none'?' active':''}" data-id="${b.id}">${b.label}</button>`
  ).join('');
  g.addEventListener('click', e => {
    const btn = e.target.closest('.border-opt');
    if (!btn) return;
    S.borderStyle = btn.dataset.id;
    g.querySelectorAll('.border-opt').forEach(b => b.classList.toggle('active', b.dataset.id === S.borderStyle));
    render();
  });
}

function buildPalettes() {
  const sec = $('paletteSection');
  sec.innerHTML = PALETTES.map(p =>
    `<div class="palette-row">
      <span class="palette-name">${p.name}</span>
      ${p.colors.map(c => `<div class="palette-swatch" style="background:${c}" data-color="${c}" title="${c}"></div>`).join('')}
    </div>`
  ).join('');
  sec.addEventListener('click', e => {
    const sw = e.target.closest('.palette-swatch');
    if (!sw) return;
    S.bgColor1 = sw.dataset.color;
    $('bgColor1').value = sw.dataset.color;
    render();
    toast('Color applied');
  });
}

function bindInputs() {
  const bind = (id, key, ev='input') => {
    const el = $(id);
    if (!el) return;
    el.addEventListener(ev, () => {
      if (el.type === 'checkbox') S[key] = el.checked;
      else if (el.type === 'range' || el.type === 'number') S[key] = Number(el.value);
      else S[key] = el.value;
      syncUI();
      render();
    });
  };
  bind('headline','headline');
  bind('subtitle','subtitle');
  bind('fontSize','fontSize');
  bind('subSize','subSize');
  bind('textColor','textColor');
  bind('subColor','subColor');
  bind('textShadow','textShadow','change');
  bind('boldText','boldText','change');
  bind('textPos','textPos','change');
  bind('bgType','bgType','change');
  bind('bgColor1','bgColor1');
  bind('bgColor2','bgColor2');
  bind('bgImage','bgImage');
  bind('bgDim','bgDim');
  bind('emojiSize','emojiSize');
  bind('borderColor','borderColor');

  $('bgType').addEventListener('change', toggleBgFields);
  $('bgImage').addEventListener('change', loadBgImage);
}

function toggleBgFields() {
  const t = S.bgType;
  $('bgColorRow').style.display = t === 'image' ? 'none' : 'flex';
  $('bgImageRow').style.display = t === 'image' ? 'block' : 'none';
  $('bgDimRow').style.display = t === 'image' ? 'block' : 'none';
  if (t !== 'image') $('bgDimRow').style.display = 'none';
  if (t === 'gradient') {
    $('bgColor2').parentElement.style.display = '';
  } else if (t === 'solid') {
    $('bgColor2').parentElement.style.display = 'none';
  }
  if (t === 'image') $('bgDimRow').style.display = 'block';
}

function loadBgImage() {
  if (!S.bgImage) { bgImgLoaded = false; render(); return; }
  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = () => { bgImg = img; bgImgLoaded = true; render(); };
  img.onerror = () => { bgImgLoaded = false; toast('Image failed to load'); render(); };
  img.src = S.bgImage;
}

function syncUI() {
  $('fontSizeVal').textContent = S.fontSize;
  $('subSizeVal').textContent = S.subSize;
  $('bgDimVal').textContent = S.bgDim + '%';
  $('emojiSizeVal').textContent = S.emojiSize;
}

// ===== Templates =====
function applyTemplate(id) {
  const t = TEMPLATES.find(x => x.id === id);
  if (!t) return;
  S.template = id;
  S.bgType = 'gradient';
  S.bgColor1 = t.bg1;
  S.bgColor2 = t.bg2;
  S.textColor = t.textColor;
  S.subColor = t.textColor;
  S.headline = t.headline;
  S.subtitle = t.subtitle;
  S.fontSize = t.fontSize;
  S.boldText = t.bold;
  S.textShadow = t.shadow;
  S.textPos = t.pos;
  S.emoji = t.emoji;

  // Sync form
  $('headline').value = S.headline;
  $('subtitle').value = S.subtitle;
  $('fontSize').value = S.fontSize;
  $('textColor').value = S.textColor;
  $('subColor').value = S.subColor;
  $('textShadow').checked = S.textShadow;
  $('boldText').checked = S.boldText;
  $('textPos').value = S.textPos;
  $('bgType').value = S.bgType;
  $('bgColor1').value = S.bgColor1;
  $('bgColor2').value = S.bgColor2;

  $('tplGrid').querySelectorAll('.tpl-btn').forEach(b => b.classList.toggle('active', b.dataset.id === id));
  $('emojiGrid').querySelectorAll('.emoji-btn').forEach(b => b.classList.toggle('active', b.dataset.emoji === S.emoji));
  toggleBgFields();
  syncUI();
  render();
  toast(`${t.name} template applied`);
}

// ===== Render =====
function render() {
  const W = 1280, H = 720;
  ctx.clearRect(0, 0, W, H);

  // Border inset
  let bw = 0;
  let br = 0;
  if (S.borderStyle === 'thin') bw = 6;
  else if (S.borderStyle === 'thick') bw = 16;
  else if (S.borderStyle === 'rounded') { bw = 10; br = 30; }

  // Clip for rounded
  if (br > 0) {
    ctx.save();
    roundRect(ctx, 0, 0, W, H, br);
    ctx.clip();
  }

  // Background
  if (S.bgType === 'image' && bgImgLoaded && bgImg) {
    const scale = Math.max(W / bgImg.width, H / bgImg.height);
    const sw = bgImg.width * scale;
    const sh = bgImg.height * scale;
    ctx.drawImage(bgImg, (W - sw) / 2, (H - sh) / 2, sw, sh);
    ctx.fillStyle = `rgba(0,0,0,${S.bgDim / 100})`;
    ctx.fillRect(0, 0, W, H);
  } else if (S.bgType === 'gradient') {
    const grd = ctx.createLinearGradient(0, 0, W, H);
    grd.addColorStop(0, S.bgColor1);
    grd.addColorStop(1, S.bgColor2);
    ctx.fillStyle = grd;
    ctx.fillRect(0, 0, W, H);
  } else {
    ctx.fillStyle = S.bgColor1;
    ctx.fillRect(0, 0, W, H);
  }

  // Border
  if (bw > 0) {
    ctx.strokeStyle = S.borderColor;
    ctx.lineWidth = bw * 2;
    if (br > 0) {
      roundRect(ctx, 0, 0, W, H, br);
      ctx.stroke();
    } else {
      ctx.strokeRect(0, 0, W, H);
    }
  }

  // Text position Y
  let textY;
  if (S.textPos === 'top') textY = H * 0.22;
  else if (S.textPos === 'bottom') textY = H * 0.72;
  else textY = H * 0.46;

  // Shadow
  if (S.textShadow) {
    ctx.shadowColor = 'rgba(0,0,0,0.55)';
    ctx.shadowBlur = 18;
    ctx.shadowOffsetX = 3;
    ctx.shadowOffsetY = 3;
  }

  // Headline
  const weight = S.boldText ? '800' : '600';
  ctx.font = `${weight} ${S.fontSize}px 'Sora', sans-serif`;
  ctx.fillStyle = S.textColor;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  wrapText(ctx, S.headline, W / 2, textY, W - 120, S.fontSize * 1.15);

  // Subtitle
  if (S.subtitle) {
    ctx.shadowBlur = S.textShadow ? 10 : 0;
    ctx.font = `500 ${S.subSize}px 'Sora', sans-serif`;
    ctx.fillStyle = S.subColor;
    const subY = textY + S.fontSize * 0.9 + 10;
    ctx.fillText(S.subtitle, W / 2, subY);
  }

  // Reset shadow
  ctx.shadowColor = 'transparent';
  ctx.shadowBlur = 0;
  ctx.shadowOffsetX = 0;
  ctx.shadowOffsetY = 0;

  // Emoji overlay
  if (S.emoji) {
    ctx.font = `${S.emojiSize}px 'Sora', sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    // Decode html entity
    const tmp = document.createElement('span');
    tmp.innerHTML = S.emoji;
    const ch = tmp.textContent;
    ctx.fillText(ch, W - 100, 100);
  }

  if (br > 0) ctx.restore();
}

function wrapText(ctx, text, x, y, maxW, lineH) {
  const words = text.split(' ');
  let line = '';
  const lines = [];
  for (const w of words) {
    const test = line + w + ' ';
    if (ctx.measureText(test).width > maxW && line) {
      lines.push(line.trim());
      line = w + ' ';
    } else {
      line = test;
    }
  }
  lines.push(line.trim());
  const startY = y - ((lines.length - 1) * lineH) / 2;
  for (let i = 0; i < lines.length; i++) {
    ctx.fillText(lines[i], x, startY + i * lineH);
  }
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// ===== Download =====
function downloadPNG() {
  render();
  const link = document.createElement('a');
  link.download = 'thumbnail-1280x720.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
  toast('PNG downloaded');
}

// ===== Save / Load =====
function getDesigns() {
  try { return JSON.parse(localStorage.getItem('yt_thumb_designs') || '[]'); } catch { return []; }
}

function saveDesign() {
  const name = $('saveName').value.trim() || ('Design ' + (getDesigns().length + 1));
  const designs = getDesigns();
  designs.push({ name, state: JSON.parse(JSON.stringify(S)), ts: Date.now() });
  localStorage.setItem('yt_thumb_designs', JSON.stringify(designs));
  $('saveName').value = '';
  loadSavedList();
  toast(`"${name}" saved`);
}

function loadDesign(idx) {
  const designs = getDesigns();
  const d = designs[idx];
  if (!d) return;
  Object.assign(S, d.state);
  // Sync all inputs
  $('headline').value = S.headline;
  $('subtitle').value = S.subtitle;
  $('fontSize').value = S.fontSize;
  $('subSize').value = S.subSize;
  $('textColor').value = S.textColor;
  $('subColor').value = S.subColor;
  $('textShadow').checked = S.textShadow;
  $('boldText').checked = S.boldText;
  $('textPos').value = S.textPos;
  $('bgType').value = S.bgType;
  $('bgColor1').value = S.bgColor1;
  $('bgColor2').value = S.bgColor2;
  $('bgImage').value = S.bgImage || '';
  $('bgDim').value = S.bgDim;
  $('emojiSize').value = S.emojiSize;
  $('borderColor').value = S.borderColor;

  $('tplGrid').querySelectorAll('.tpl-btn').forEach(b => b.classList.toggle('active', b.dataset.id === S.template));
  $('emojiGrid').querySelectorAll('.emoji-btn').forEach(b => b.classList.toggle('active', b.dataset.emoji === S.emoji));
  $('borderOpts').querySelectorAll('.border-opt').forEach(b => b.classList.toggle('active', b.dataset.id === S.borderStyle));
  toggleBgFields();
  syncUI();
  if (S.bgType === 'image' && S.bgImage) loadBgImage();
  else render();
  toast(`Loaded "${d.name}"`);
}

function deleteDesign(idx) {
  const designs = getDesigns();
  designs.splice(idx, 1);
  localStorage.setItem('yt_thumb_designs', JSON.stringify(designs));
  loadSavedList();
  toast('Design deleted');
}

function loadSavedList() {
  const designs = getDesigns();
  const el = $('savedList');
  if (!designs.length) { el.innerHTML = '<div style="font-size:.75rem;color:#bbb;padding:4px 0;">No saved designs yet</div>'; return; }
  el.innerHTML = designs.map((d, i) =>
    `<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border);">
      <span style="flex:1;font-size:.78rem;font-weight:500;color:var(--heading);cursor:pointer;" onclick="loadDesign(${i})">${d.name}</span>
      <button class="btn btn-outline" style="padding:4px 10px;font-size:.68rem;" onclick="loadDesign(${i})">Load</button>
      <button class="btn btn-outline" style="padding:4px 10px;font-size:.68rem;color:var(--accent);border-color:var(--accent);" onclick="deleteDesign(${i})">Del</button>
    </div>`
  ).join('');
}

function resetAll() {
  S.headline = 'YOUR HEADLINE HERE';
  S.subtitle = '';
  S.fontSize = 64;
  S.subSize = 28;
  S.textColor = '#ffffff';
  S.subColor = '#ffffff';
  S.textShadow = true;
  S.boldText = true;
  S.textPos = 'center';
  S.bgType = 'gradient';
  S.bgColor1 = '#1a1a2e';
  S.bgColor2 = '#e63946';
  S.bgImage = '';
  S.bgDim = 30;
  S.emoji = '';
  S.emojiSize = 80;
  S.borderStyle = 'none';
  S.borderColor = '#e63946';
  S.template = '';

  $('headline').value = S.headline;
  $('subtitle').value = S.subtitle;
  $('fontSize').value = S.fontSize;
  $('subSize').value = S.subSize;
  $('textColor').value = S.textColor;
  $('subColor').value = S.subColor;
  $('textShadow').checked = S.textShadow;
  $('boldText').checked = S.boldText;
  $('textPos').value = S.textPos;
  $('bgType').value = S.bgType;
  $('bgColor1').value = S.bgColor1;
  $('bgColor2').value = S.bgColor2;
  $('bgImage').value = '';
  $('bgDim').value = S.bgDim;
  $('emojiSize').value = S.emojiSize;
  $('borderColor').value = S.borderColor;

  bgImg = null;
  bgImgLoaded = false;

  $('tplGrid').querySelectorAll('.tpl-btn').forEach(b => b.classList.remove('active'));
  $('emojiGrid').querySelectorAll('.emoji-btn').forEach(b => b.classList.remove('active'));
  $('borderOpts').querySelectorAll('.border-opt').forEach(b => b.classList.toggle('active', b.dataset.id === 'none'));
  toggleBgFields();
  syncUI();
  render();
  toast('Reset to defaults');
}

// ===== Toast =====
function toast(msg) {
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 2200);
}

// ===== Boot =====
toggleBgFields();
init();
</script>
