<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI CV Builder — LifeHub</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#f5f5f3;--surface:#fff;--border:rgba(0,0,0,0.07);--accent:#1a1a1a;--text:#555;--heading:#1a1a1a;--muted:#999}
body{font-family:'Sora',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:14px}
button{font-family:inherit;cursor:pointer}
.app{display:grid;grid-template-columns:420px 1fr;min-height:100vh}

/* ── Sidebar ── */
.sidebar{background:var(--surface);border-right:1px solid var(--border);overflow-y:auto;max-height:100vh;scrollbar-width:thin}
.sidebar-inner{padding:18px 20px 40px}
.brand{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.brand h1{font-size:1.05rem;font-weight:700;color:var(--heading)}
.brand .badge{font-size:0.58rem;font-weight:600;padding:3px 7px;border-radius:99px;background:#10b98120;color:#059669;letter-spacing:0.04em}
.brand .tagline{font-size:0.65rem;color:var(--muted);margin-bottom:12px}

.section-title{font-size:0.6rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.12em;margin:18px 0 8px;padding-top:14px;border-top:1px solid var(--border);cursor:pointer;display:flex;justify-content:space-between;align-items:center;user-select:none}
.section-title::after{content:'▾';font-size:0.65rem;transition:transform 0.2s}
.section-title.collapsed::after{transform:rotate(-90deg)}
.section-content{overflow:hidden;max-height:3000px;transition:max-height 0.3s;opacity:1}
.section-content.hidden{max-height:0;opacity:0;margin-bottom:0}

.field{margin-bottom:8px}
.field label{display:flex;justify-content:space-between;align-items:center;font-size:0.68rem;font-weight:500;color:#888;margin-bottom:3px}
.field input,.field textarea,.field select{width:100%;padding:9px 12px;background:var(--bg);border:1px solid var(--border);border-radius:9px;color:var(--heading);font-family:inherit;font-size:0.82rem}
.field input:focus,.field textarea:focus,.field select:focus{outline:none;border-color:var(--heading)}
.field textarea{resize:vertical;min-height:52px}
.row{display:grid;grid-template-columns:1fr 1fr;gap:8px}

/* ── CV Library ── */
.cv-library{display:flex;gap:6px;align-items:center;margin-bottom:6px}
.cv-library select{flex:1;padding:8px 10px;background:var(--bg);border:1px solid var(--border);border-radius:9px;font-size:0.82rem;font-family:inherit;font-weight:500}
.icon-btn{width:30px;height:30px;display:inline-flex;align-items:center;justify-content:center;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:#888;font-size:0.8rem;flex-shrink:0}
.icon-btn:hover{background:var(--heading);color:#fff}

/* ── API Key ── */
.key-row{display:flex;gap:6px}
.key-row input{flex:1}
.kv-status{font-size:0.7rem;padding:3px 8px;border-radius:99px;display:inline-block;margin-top:4px}
.kv-status.ok{background:#10b98120;color:#059669}
.kv-status.warn{background:#f59e0b20;color:#b45309}
.help{font-size:0.7rem;color:#aaa;line-height:1.5;margin-top:6px}
.help a{color:#2563eb;text-decoration:none}

/* ── Templates ── */
.tpl-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:5px}
.tpl-btn{padding:8px 2px;background:var(--bg);border:1px solid var(--border);border-radius:8px;font-size:0.64rem;font-weight:500;color:#666;display:flex;flex-direction:column;align-items:center;gap:2px}
.tpl-btn.active{background:var(--heading);color:#fff;border-color:var(--heading)}
.tpl-btn::before{content:'';display:block;width:26px;height:34px;background:#fff;border:1px solid currentColor;border-radius:3px;position:relative;opacity:0.8}

/* ── Theme Swatches ── */
.swatches{display:flex;gap:6px;flex-wrap:wrap}
.swatch{width:26px;height:26px;border-radius:7px;border:2px solid transparent;transition:all 0.15s}
.swatch.active{transform:scale(1.15);border-color:var(--heading)}
.swatch-picker{background:conic-gradient(red,yellow,lime,aqua,blue,magenta,red);position:relative;overflow:hidden}

/* ── Photo ── */
.photo-row{display:flex;align-items:center;gap:10px}
.photo-preview{width:56px;height:56px;border-radius:50%;background:var(--bg);border:1px dashed var(--border);display:flex;align-items:center;justify-content:center;overflow:hidden;cursor:pointer;font-size:1rem;color:#bbb}
.photo-preview img{width:100%;height:100%;object-fit:cover}
.photo-actions{display:flex;gap:6px}
.photo-input-hidden{display:none}

/* ── Entries ── */
.entry-card{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:10px;margin-bottom:7px;position:relative}
.entry-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.entry-head strong{font-size:0.68rem;color:#888;font-weight:600;text-transform:uppercase;letter-spacing:0.08em}
.entry-remove{width:22px;height:22px;padding:0;font-size:0.9rem}
.add-entry{width:100%;padding:9px;background:transparent;border:1px dashed var(--border);border-radius:9px;color:#999;font-size:0.75rem;margin-top:2px}
.add-entry:hover{background:rgba(0,0,0,0.02);color:var(--heading)}

/* ── Skills ── */
.skills-list{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:6px;min-height:20px}
.skill-tag{padding:4px 10px;background:var(--bg);border:1px solid var(--border);border-radius:99px;font-size:0.72rem;color:var(--heading);display:inline-flex;align-items:center;gap:5px}
.skill-tag button{background:none;border:none;color:#ccc;font-size:0.8rem;padding:0;line-height:1}
.skill-tag button:hover{color:#e74c3c}
.skill-input-row{display:flex;gap:5px}
.skill-input-row input{flex:1}
.skill-input-row button{padding:0 12px;background:var(--bg);border:1px solid var(--border);border-radius:9px;font-size:0.78rem;color:#666}

/* ── AI Buttons ── */
.ai-btn{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;border:none;border-radius:6px;padding:3px 8px;font-size:0.68rem;font-weight:600}
.ai-btn:hover{filter:brightness(1.1)}
.ai-btn[disabled]{opacity:0.6;cursor:wait}

.primary-row{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:8px}
.btn-ai{padding:9px;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;border:none;border-radius:9px;font-size:0.76rem;font-weight:600}
.btn-ai:hover{filter:brightness(1.08)}
.btn-ai[disabled]{opacity:0.6;cursor:wait}
.btn-ai.ghost{background:var(--bg);color:var(--heading);border:1px solid var(--border)}
.btn-ai.ghost:hover{background:#eee}
.btn-wide{grid-column:1/-1}

/* ── ATS Card ── */
.ats-card{background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:14px;margin-top:10px}
.ats-head{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.ats-score{font-size:1.6rem;font-weight:700;padding:6px 12px;border-radius:10px;border:2px solid;line-height:1}
.ats-score span{font-size:0.75rem;opacity:0.6;font-weight:500}
.ats-title{font-size:0.82rem;font-weight:600;color:var(--heading)}
.ats-sub{font-size:0.7rem;color:var(--muted)}
.ats-section{margin-top:10px}
.ats-label{font-size:0.65rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px}
.ats-keywords{display:flex;flex-wrap:wrap;gap:5px}
.ats-kw{padding:3px 10px;background:#fff;border:1px solid var(--border);border-radius:99px;font-size:0.72rem;color:var(--heading)}
.ats-kw:hover{background:var(--heading);color:#fff;border-color:var(--heading)}
.ats-kw:disabled{opacity:0.5;cursor:default;background:#10b98120;color:#059669;border-color:transparent}
.ats-suggestions{list-style:none;padding:0}
.ats-suggestions li{font-size:0.76rem;color:#555;line-height:1.5;padding-left:14px;position:relative;margin-bottom:4px}
.ats-suggestions li::before{content:'→';position:absolute;left:0;color:var(--muted)}

/* ── Actions Bar ── */
.actions{display:grid;grid-template-columns:1fr auto;gap:8px;margin-top:16px;padding-top:16px;border-top:1px solid var(--border);position:sticky;bottom:0;background:var(--surface);padding-bottom:6px}
.btn-print{padding:12px;background:var(--heading);color:#fff;border:none;border-radius:10px;font-weight:600;font-size:0.82rem}
.btn-print:hover{background:#333}
.btn-reset{padding:12px 14px;background:var(--bg);color:#999;border:1px solid var(--border);border-radius:10px;font-size:0.8rem}

/* ── Preview Area ── */
.preview-area{overflow-y:auto;padding:24px;display:flex;flex-direction:column;align-items:center;gap:12px}
.preview-tabs{display:none;gap:4px;padding:3px;background:var(--surface);border:1px solid var(--border);border-radius:10px}
.preview-tabs button{padding:7px 16px;border:none;background:transparent;border-radius:7px;font-size:0.78rem;color:#888;font-weight:500}
.preview-tabs button.active{background:var(--heading);color:#fff}
#preview{width:100%;max-width:720px;display:flex;justify-content:center}

/* ── Toast / Undo ── */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--heading);color:#fff;padding:10px 18px;border-radius:99px;font-size:0.8rem;cursor:pointer;opacity:0;transition:all 0.25s;pointer-events:none;z-index:100;box-shadow:0 4px 20px rgba(0,0,0,0.15)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:auto}

/* ── Undo corner button ── */
#undo-btn{position:fixed;top:14px;right:14px;z-index:50;padding:6px 12px;font-size:0.72rem;background:var(--surface);border:1px solid var(--border);border-radius:99px;color:#666}
#undo-btn[disabled]{opacity:0.4;cursor:not-allowed}

/* ── Modal ── */
.rb-modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:200;opacity:0;pointer-events:none;transition:opacity 0.2s;padding:20px}
.rb-modal-backdrop.show{opacity:1;pointer-events:auto}
.rb-modal{background:var(--surface);border-radius:14px;padding:24px;max-width:480px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,0.25);transform:translateY(10px);transition:transform 0.2s}
.rb-modal-backdrop.show .rb-modal{transform:translateY(0)}
.rb-modal h3{font-size:1rem;font-weight:700;color:var(--heading);margin-bottom:6px}
.rb-modal p{font-size:0.82rem;color:#666;line-height:1.5;margin-bottom:14px;white-space:pre-wrap}
.rb-modal p a{color:#2563eb}
.rb-modal input,.rb-modal textarea{width:100%;padding:10px 12px;background:var(--bg);border:1px solid var(--border);border-radius:10px;color:var(--heading);font-family:inherit;font-size:0.88rem;margin-bottom:14px}
.rb-modal textarea{min-height:90px;resize:vertical}
.rb-modal input:focus,.rb-modal textarea:focus{outline:none;border-color:var(--heading)}
.rb-modal-actions{display:flex;gap:8px;justify-content:flex-end}
.rb-modal-btn{padding:10px 18px;border-radius:10px;font-size:0.82rem;font-weight:600;border:none;font-family:inherit}
.rb-modal-btn-primary{background:var(--heading);color:#fff}
.rb-modal-btn-primary:hover{background:#333}
.rb-modal-btn-danger{background:#dc2626;color:#fff}
.rb-modal-btn-danger:hover{background:#b91c1c}
.rb-modal-btn-ghost{background:var(--bg);color:#666;border:1px solid var(--border)}
.rb-modal-btn-ghost:hover{background:#eee}

/* ── History Modal (wider) ── */
.rb-modal-wide{max-width:680px}
.history-toolbar{display:flex;gap:6px;margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.history-toolbar input{flex:1;margin:0}
.history-toolbar button{padding:9px 14px;background:var(--heading);color:#fff;border:none;border-radius:9px;font-size:0.78rem;font-weight:600;font-family:inherit}
.history-toolbar button:hover{background:#333}
.history-empty{text-align:center;padding:30px 20px;color:var(--muted);font-size:0.82rem}
.history-list{max-height:440px;overflow-y:auto;margin:-4px;padding:4px}
.history-item{display:grid;grid-template-columns:1fr auto;gap:10px;padding:12px;background:var(--bg);border:1px solid var(--border);border-radius:10px;margin-bottom:6px}
.history-meta-row{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap;margin-bottom:4px}
.history-time{font-size:0.78rem;font-weight:600;color:var(--heading)}
.history-source{font-size:0.6rem;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;padding:2px 7px;border-radius:99px;background:#e5e7eb;color:#666}
.history-source.ai{background:#ede9fe;color:#7c3aed}
.history-source.import{background:#dbeafe;color:#2563eb}
.history-source.manual{background:#dcfce7;color:#16a34a}
.history-note{font-size:0.78rem;color:#666;margin-top:2px;line-height:1.4}
.history-size{font-size:0.66rem;color:var(--muted);margin-top:3px}
.history-actions{display:flex;flex-direction:column;gap:4px;justify-content:center}
.history-btn{padding:5px 10px;font-size:0.7rem;border-radius:7px;border:1px solid var(--border);background:#fff;color:#555;font-family:inherit;font-weight:500;cursor:pointer;text-align:center}
.history-btn:hover{background:var(--heading);color:#fff;border-color:var(--heading)}
.history-btn.danger:hover{background:#dc2626;border-color:#dc2626}
.history-row-actions{display:flex;gap:4px;flex-wrap:wrap;justify-content:flex-end}

/* ========== RESUME TEMPLATES CSS ========== */
.rb{width:720px;background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,0.08);border:1px solid var(--border);font-family:'Sora',system-ui,sans-serif;color:#333}
.rb h1,.rb h3,.rb h4{color:#1a1a1a}
.rb p{line-height:1.55}
.rb-name{font-size:1.7rem;font-weight:700;letter-spacing:-0.02em;line-height:1.1}
.rb-title{font-size:0.88rem;color:#888;margin-top:3px}
.rb-photo{width:80px;height:80px;border-radius:50%;object-fit:cover;flex-shrink:0}
.rb-photo-lg{width:110px;height:110px;border:3px solid rgba(255,255,255,0.2);display:block;margin:0 auto 14px}
.rb-photo-placeholder{width:110px;height:110px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:2.5rem;font-weight:700;margin:0 auto 14px;color:#fff}

.rb-contact{display:flex;flex-wrap:wrap;gap:10px;margin-top:8px;font-size:0.72rem;color:#999}
.rb-center-row{justify-content:center}

.rb-header{padding:32px 40px;display:flex;gap:20px;align-items:center}
.rb-header.rb-center{text-align:center;flex-direction:column;align-items:center;gap:6px}
.rb-body{padding:28px 40px 36px}
.rb-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:26px}
.rb-single{display:block}
.rb-full{grid-column:1/-1}

.rb section{margin-bottom:18px}
.rb h3{font-size:0.65rem;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:0.14em;margin-bottom:10px;padding-bottom:5px;border-bottom:2px solid #1a1a1a}
.rb-entry{margin-bottom:12px}
.rb-entry h4{font-size:0.88rem;font-weight:600}
.rb-entry .rb-meta{font-size:0.72rem;color:#999;margin:2px 0 4px}
.rb-entry p{font-size:0.78rem;color:#555;line-height:1.6}
.rb-summary{font-size:0.84rem;color:#555;line-height:1.7}
.rb-skills{display:flex;flex-wrap:wrap;gap:6px}
.rb-skill{padding:4px 12px;background:#f5f5f3;border-radius:99px;font-size:0.7rem;color:#1a1a1a;font-weight:500}

/* Classic */
.rb-classic-h{border-bottom:1px solid #333 !important}
.rb-skills-inline{font-size:0.8rem;color:#555}

/* Creative */
.rb-creative{display:grid;grid-template-columns:250px 1fr;min-height:900px;border-radius:8px;overflow:hidden}
.rb-side{padding:30px 22px;color:#fff}
.rb-side-inner{text-align:center}
.rb-side-h{font-size:0.64rem;font-weight:700;text-transform:uppercase;letter-spacing:0.12em;margin:16px 0 6px;opacity:0.8;text-align:left}
.rb-contact-list{list-style:none;padding:0;font-size:0.72rem;text-align:left;line-height:1.9;opacity:0.9}
.rb-side-skills{display:flex;flex-wrap:wrap;gap:4px}
.rb-side-skills span{font-size:0.68rem;padding:3px 8px;background:rgba(255,255,255,0.15);border-radius:99px}
.rb-side-edu{text-align:left;font-size:0.72rem;margin-bottom:8px;opacity:0.9;line-height:1.4}
.rb-main{padding:30px 32px}
.rb-main h3{color:#1a1a1a;border:none;padding:0;margin-bottom:6px}
.rb-timeline-entry{padding-bottom:6px}

/* Minimal */
.rb-min-header{padding:50px 40px 20px;text-align:left}
.rb-min-h{font-size:0.58rem !important;letter-spacing:0.18em !important;border-bottom:none !important;padding-bottom:0 !important;color:#1a1a1a !important;margin-top:20px !important}

/* Tech */
.rb-tech-header{padding:28px 40px;display:grid !important;grid-template-columns:1fr auto;gap:24px;align-items:start}
.rb-tech-mono{font-family:'JetBrains Mono',monospace;font-size:0.72rem;line-height:1.7;opacity:0.85}
.rb-tech-right{text-align:right}
.rb-tech-h{font-size:0.78rem !important;letter-spacing:0 !important;font-family:'JetBrains Mono',monospace !important;border-bottom:none !important;padding-bottom:0 !important;text-transform:none !important;font-weight:500 !important}

/* Cover Letter */
.rb-cover{max-width:720px}
.rb-cover-head{padding:32px 40px 20px;display:flex;justify-content:space-between;align-items:flex-start;gap:20px}
.rb-cover-meta{text-align:right;font-size:0.76rem;color:#777;line-height:1.6}
.rb-cover-body{padding:16px 50px 40px}
.rb-cover-text{font-size:0.88rem;color:#333;line-height:1.8;white-space:pre-wrap}

/* ── Print ── */
@media print{
  #undo-btn,.toast,.sidebar,.preview-tabs{display:none !important}
  .app{display:block !important}
  .preview-area{padding:0 !important}
  .rb{box-shadow:none !important;border:none !important;width:100% !important;border-radius:0 !important;max-width:none}
}

/* ── Responsive ── */
@media(max-width:1000px){
  .app{grid-template-columns:1fr}
  .sidebar{max-height:none;border-right:none;border-bottom:1px solid var(--border)}
  .preview-area{padding:16px}
  .rb{width:100%;max-width:none}
}
</style>
</head>
<body>
<button id="undo-btn" disabled>↶ Undo AI</button>

<div class="app">
  <aside class="sidebar">
    <div class="sidebar-inner">
      <div class="brand">
        <h1>AI CV Builder</h1>
        <span class="badge">AI</span>
      </div>
      <p class="tagline">Tailor your CV to any job with AI</p>

      <!-- CV Library -->
      <div class="section-title" id="cv-lib-title">CV Library</div>
      <div class="section-content">
        <div class="cv-library">
          <select id="cv-select" title="Switch CV"></select>
          <button class="icon-btn" id="cv-new" title="New CV">+</button>
          <button class="icon-btn" id="cv-rename" title="Rename">✎</button>
          <button class="icon-btn" id="cv-duplicate" title="Duplicate">⎘</button>
          <button class="icon-btn" id="cv-history" title="Version history">🕒</button>
          <button class="icon-btn" id="cv-delete" title="Delete">🗑</button>
        </div>
        <label class="btn-ai ghost" id="cv-upload-btn" for="cv-upload-input" style="width:100%;margin-top:6px;display:block;text-align:center">⬆ Import existing CV (PDF / DOCX / TXT)</label>
        <input type="file" id="cv-upload-input" accept=".pdf,.docx,.txt,.md" style="display:none">
        <button class="btn-ai" id="btn-generate" data-busy="generate" style="width:100%;margin-top:5px">✨ Generate CV from prompt</button>
      </div>

      <!-- Settings / API Key -->
      <div class="section-title" id="settings-title">Settings (Gemini API)</div>
      <div class="section-content hidden" id="settings-section">
        <div class="field">
          <label>Gemini API Key <span id="api-key-status" class="kv-status warn">Not set</span></label>
          <div class="key-row">
            <input type="password" id="api-key-input" placeholder="AIzaSy...">
            <button class="icon-btn" id="api-key-save" title="Save">✓</button>
            <button class="icon-btn" id="api-key-clear" title="Clear">×</button>
          </div>
          <p class="help">Free key from <a href="https://aistudio.google.com/apikey" target="_blank">aistudio.google.com/apikey</a> — stored locally in your browser.</p>
        </div>
        <div class="field">
          <label>Model</label>
          <select id="model-select">
            <option value="gemini-2.0-flash">gemini-2.0-flash (recommended — highest free RPM)</option>
            <option value="gemini-2.5-flash">gemini-2.5-flash (smarter, lower RPM)</option>
            <option value="gemini-2.5-pro">gemini-2.5-pro (best quality, slowest)</option>
            <option value="gemini-flash-latest">gemini-flash-latest (newest preview, tight limits)</option>
            <option value="gemini-pro-latest">gemini-pro-latest (newest Pro preview)</option>
          </select>
        </div>
      </div>

      <!-- Target Job / JD -->
      <div class="section-title">Target Job (for AI)</div>
      <div class="section-content">
        <div class="field">
          <label>Paste job description</label>
          <textarea id="target-job" rows="5" placeholder="Paste the full job posting here to enable AI tailoring, ATS scoring, and cover letters…"></textarea>
        </div>
        <div class="primary-row">
          <button class="btn-ai" id="btn-tailor" data-busy="tailor">✨ Tailor CV</button>
          <button class="btn-ai ghost" id="btn-ats" data-busy="ats">📊 ATS Score</button>
          <button class="btn-ai ghost btn-wide" id="btn-cover" data-busy="cover">✉ Generate Cover Letter</button>
        </div>
        <div id="ats-card" class="ats-card" style="display:none"></div>
      </div>

      <!-- Templates -->
      <div class="section-title">Template</div>
      <div class="section-content">
        <div class="tpl-grid" id="template-picker"></div>
      </div>

      <!-- Theme -->
      <div class="section-title">Accent Color</div>
      <div class="section-content">
        <div class="swatches" id="theme-swatches"></div>
      </div>

      <!-- Photo -->
      <div class="section-title">Photo</div>
      <div class="section-content">
        <div class="photo-row">
          <label class="photo-preview" id="photo-preview" for="photo-input">+</label>
          <input type="file" id="photo-input" class="photo-input-hidden" accept="image/*">
          <div class="photo-actions">
            <button class="icon-btn" id="photo-remove" style="display:none" title="Remove">×</button>
          </div>
        </div>
      </div>

      <!-- Personal Info -->
      <div class="section-title">Personal Info</div>
      <div class="section-content">
        <div class="field"><label>Full Name</label><input type="text" id="f-name"></div>
        <div class="field"><label>Job Title</label><input type="text" id="f-title"></div>
        <div class="row">
          <div class="field"><label>Email</label><input type="email" id="f-email"></div>
          <div class="field"><label>Phone</label><input type="tel" id="f-phone"></div>
        </div>
        <div class="row">
          <div class="field"><label>Location</label><input type="text" id="f-location"></div>
          <div class="field"><label>Website</label><input type="text" id="f-website"></div>
        </div>
      </div>

      <!-- Summary -->
      <div class="section-title">Summary</div>
      <div class="section-content">
        <div class="field">
          <label>Professional summary <button class="ai-btn" id="btn-improve-summary" data-busy="summary">✨ Improve</button></label>
          <textarea id="f-summary" rows="4"></textarea>
        </div>
      </div>

      <!-- Experience -->
      <div class="section-title">Experience</div>
      <div class="section-content" id="exp-list"></div>

      <!-- Education -->
      <div class="section-title">Education</div>
      <div class="section-content" id="edu-list"></div>

      <!-- Skills -->
      <div class="section-title">Skills</div>
      <div class="section-content">
        <div class="skills-list" id="skills-list"></div>
        <div class="skill-input-row">
          <input type="text" id="skill-add-input" placeholder="Add a skill, press Enter">
          <button id="skill-add-btn">Add</button>
        </div>
      </div>

      <!-- Actions -->
      <div class="actions">
        <button class="btn-print" id="btn-print">Download PDF</button>
        <button class="btn-reset" id="btn-reset">Reset</button>
      </div>
    </div>
  </aside>

  <main class="preview-area">
    <div class="preview-tabs" id="preview-tabs"></div>
    <div id="preview"></div>
  </main>
</div>

<div class="toast" id="toast"></div>
<div class="rb-modal-backdrop" id="modal-backdrop" aria-hidden="true"></div>

<!-- Scripts (order matters: storage → ai → parsers → templates → app) -->
<script src="storage.js"></script>
<script src="ai.js"></script>
<script src="parsers.js"></script>
<script src="templates.js"></script>
<script src="app.js"></script>

<!-- LifeHub SDK analytics -->
<script src="../dashboard/lifehub-sdk.js"
        data-tool-id="resume-builder"
        data-tool-name="AI CV Builder"
        data-category="content"></script>
</body>
</html>
