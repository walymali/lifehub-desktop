<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Planner - Complete Planning Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#faf9f7;--card:#fff;--border:rgba(0,0,0,0.06);--accent:#b4838d;--accent2:#d4a574;--heading:#2d2d2d;--text:#777}
body{font-family:'Sora',system-ui,sans-serif;background:var(--bg);color:var(--text)}
.app{max-width:1200px;margin:0 auto;padding:24px}
.header{text-align:center;margin-bottom:32px}
.header h1{font-size:2.2rem;font-weight:700;color:var(--heading);letter-spacing:-0.03em}
.header h1 span{color:var(--accent)}
.header p{font-size:0.88rem;color:#aaa;margin-top:4px}
.tabs{display:flex;gap:4px;justify-content:center;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:4px;margin-bottom:24px;overflow-x:auto;scrollbar-width:none;max-width:700px;margin-inline:auto}
.tabs::-webkit-scrollbar{display:none}
.tab-btn{padding:9px 18px;border:none;border-radius:10px;background:transparent;color:#aaa;font-size:0.72rem;font-weight:500;cursor:pointer;font-family:inherit;transition:all 0.2s;white-space:nowrap}
.tab-btn.active{background:var(--accent);color:#fff}
.tab-content{display:none}.tab-content.active{display:block}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.stat{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:18px;text-align:center}
.stat .num{font-size:1.6rem;font-weight:700;color:var(--heading)}
.stat .lbl{font-size:0.6rem;color:#bbb;text-transform:uppercase;letter-spacing:0.08em;margin-top:2px}
.stat.rose .num{color:var(--accent)}
.stat.gold .num{color:var(--accent2)}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.panel{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden}
.panel-header{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid var(--border)}
.panel-header h2{font-size:0.82rem;font-weight:600;color:var(--heading)}
.panel-header .count{font-size:0.58rem;background:var(--accent);color:#fff;padding:2px 8px;border-radius:99px}
.panel-body{padding:12px 20px;max-height:350px;overflow-y:auto;scrollbar-width:thin}
.add-row{display:flex;gap:6px;padding:10px 20px;border-top:1px solid var(--border)}
.add-row input,.add-row select{flex:1;padding:8px 10px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--heading);font-family:inherit;font-size:0.78rem}
.add-row input:focus{outline:none;border-color:var(--accent)}
.add-btn{padding:8px 16px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-weight:600;font-size:0.75rem;cursor:pointer;font-family:inherit}
/* Items */
.item{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid rgba(0,0,0,0.03)}
.item:last-child{border-bottom:none}
.check{width:18px;height:18px;border-radius:5px;border:2px solid rgba(0,0,0,0.15);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:0.6rem;color:transparent;transition:all 0.2s;flex-shrink:0}
.check.done{background:var(--accent);border-color:var(--accent);color:#fff}
.item-text{flex:1;font-size:0.82rem;color:var(--heading)}
.item-text.done{text-decoration:line-through;color:#ccc}
.item-meta{font-size:0.68rem;color:#bbb}
.item-del{background:none;border:none;color:#ddd;cursor:pointer;font-size:0.8rem;opacity:0;transition:opacity 0.2s}
.item:hover .item-del{opacity:1}
/* Budget */
.budget-bar{height:8px;background:rgba(0,0,0,0.04);border-radius:99px;overflow:hidden;margin:8px 0}
.budget-fill{height:100%;border-radius:99px;transition:width 0.5s}
.budget-row{display:flex;justify-content:space-between;padding:8px 0;font-size:0.82rem;border-bottom:1px solid rgba(0,0,0,0.03)}
.budget-row:last-child{border-bottom:none}
.budget-row .cat{color:var(--heading);font-weight:500}
.budget-row .amt{font-weight:600;color:var(--heading)}
/* Guest */
.guest-status{display:flex;gap:4px}
.guest-badge{font-size:0.6rem;padding:2px 8px;border-radius:99px;font-weight:500}
.guest-badge.yes{background:#d1fae5;color:#059669}
.guest-badge.no{background:#fef2f2;color:#dc2626}
.guest-badge.pending{background:#fef3c7;color:#d97706}
/* Timeline */
.timeline-item{display:flex;gap:14px;padding:12px 0;border-bottom:1px solid rgba(0,0,0,0.03)}
.timeline-item:last-child{border-bottom:none}
.tl-dot{width:10px;height:10px;border-radius:50%;background:var(--accent);flex-shrink:0;margin-top:5px}
.tl-date{font-size:0.68rem;color:#bbb;margin-top:2px}
.tl-title{font-size:0.82rem;font-weight:500;color:var(--heading)}
.empty{text-align:center;padding:28px;color:#ccc;font-size:0.8rem}
.data-actions{display:flex;gap:8px;justify-content:center;margin-top:20px}
.data-btn{padding:8px 18px;border:1px solid var(--border);border-radius:8px;background:#fff;color:#999;font-size:0.72rem;cursor:pointer;font-family:inherit}
.data-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
@media(max-width:768px){.stats{grid-template-columns:1fr 1fr}.grid-2{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="app">
<div class="header"><h1>Wedding <span>Planner</span></h1><p>Your complete wedding planning dashboard</p></div>

<div class="tabs">
  <button class="tab-btn active" onclick="showTab('overview',this)">Overview</button>
  <button class="tab-btn" onclick="showTab('checklist',this)">Checklist</button>
  <button class="tab-btn" onclick="showTab('budget',this)">Budget</button>
  <button class="tab-btn" onclick="showTab('guests',this)">Guest List</button>
  <button class="tab-btn" onclick="showTab('timeline',this)">Timeline</button>
  <button class="tab-btn" onclick="showTab('vendors',this)">Vendors</button>
</div>

<div class="tab-content active" id="tab-overview">
  <div class="stats" id="overview-stats"></div>
  <div class="grid-2">
    <div class="panel"><div class="panel-header"><h2>Upcoming Tasks</h2></div><div class="panel-body" id="upcoming-tasks"></div></div>
    <div class="panel"><div class="panel-header"><h2>Budget Overview</h2></div><div class="panel-body" id="budget-overview"></div></div>
  </div>
</div>

<div class="tab-content" id="tab-checklist">
  <div class="panel"><div class="panel-header"><h2>Wedding Checklist</h2><span class="count" id="check-count">0</span></div><div class="panel-body" id="checklist-body"></div>
  <div class="add-row"><input id="check-input" placeholder="Add a task..." onkeydown="if(event.key==='Enter')addCheck()"><button class="add-btn" onclick="addCheck()">Add</button></div></div>
</div>

<div class="tab-content" id="tab-budget">
  <div class="stats" id="budget-stats"></div>
  <div class="panel"><div class="panel-header"><h2>Expenses</h2><span class="count" id="exp-count">0</span></div><div class="panel-body" id="budget-body"></div>
  <div class="add-row"><input id="bud-item" placeholder="Item..." style="flex:2"><input id="bud-amount" type="number" placeholder="Amount" style="flex:1"><select id="bud-cat" style="flex:1"><option>Venue</option><option>Catering</option><option>Photography</option><option>Flowers</option><option>Dress</option><option>Music</option><option>Decor</option><option>Other</option></select><button class="add-btn" onclick="addBudget()">Add</button></div></div>
</div>

<div class="tab-content" id="tab-guests">
  <div class="panel"><div class="panel-header"><h2>Guest List</h2><span class="count" id="guest-count">0</span></div><div class="panel-body" id="guests-body"></div>
  <div class="add-row"><input id="guest-name" placeholder="Guest name..." style="flex:2"><select id="guest-status" style="flex:1"><option value="pending">Pending</option><option value="yes">Confirmed</option><option value="no">Declined</option></select><input id="guest-table" placeholder="Table #" style="flex:1"><button class="add-btn" onclick="addGuest()">Add</button></div></div>
</div>

<div class="tab-content" id="tab-timeline">
  <div class="panel"><div class="panel-header"><h2>Wedding Day Timeline</h2></div><div class="panel-body" id="timeline-body"></div>
  <div class="add-row"><input id="tl-time" placeholder="Time (e.g. 2:00 PM)" style="flex:1"><input id="tl-event" placeholder="Event..." style="flex:2"><button class="add-btn" onclick="addTimeline()">Add</button></div></div>
</div>

<div class="tab-content" id="tab-vendors">
  <div class="panel"><div class="panel-header"><h2>Vendors & Contacts</h2><span class="count" id="vendor-count">0</span></div><div class="panel-body" id="vendors-body"></div>
  <div class="add-row"><input id="v-name" placeholder="Vendor name..." style="flex:2"><input id="v-service" placeholder="Service..." style="flex:1"><input id="v-phone" placeholder="Phone..." style="flex:1"><button class="add-btn" onclick="addVendor()">Add</button></div></div>
</div>

<div class="data-actions">
  <button class="data-btn" onclick="exportData()">Export Data</button>
  <button class="data-btn" onclick="document.getElementById('imp').click()">Import</button>
  <input type="file" id="imp" accept=".json" style="display:none" onchange="importData(this)">
</div>
</div>

<script>
const STORE='wedding_planner';
let data=JSON.parse(localStorage.getItem(STORE))||{checklist:[],budget:[],guests:[],timeline:[],vendors:[],totalBudget:30000};
['checklist','budget','guests','timeline','vendors'].forEach(k=>{if(!data[k])data[k]=[];});
if(!data.totalBudget)data.totalBudget=30000;
function save(){localStorage.setItem(STORE,JSON.stringify(data));}
function showTab(id,btn){document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));document.getElementById('tab-'+id).classList.add('active');btn.classList.add('active');}

// Demo data
if(!data.checklist.length){
  data.checklist=[{text:'Book venue',done:true},{text:'Choose wedding dress',done:true},{text:'Send save-the-dates',done:false},{text:'Book photographer',done:false},{text:'Choose catering menu',done:false},{text:'Order flowers',done:false},{text:'Book DJ/band',done:false},{text:'Send invitations',done:false},{text:'Final dress fitting',done:false},{text:'Confirm vendor payments',done:false}];
  data.budget=[{item:'Venue rental',amount:8000,cat:'Venue'},{item:'Catering (100 guests)',amount:6000,cat:'Catering'},{item:'Photographer',amount:3000,cat:'Photography'},{item:'Flowers & arrangements',amount:2000,cat:'Flowers'},{item:'Wedding dress',amount:2500,cat:'Dress'},{item:'DJ',amount:1500,cat:'Music'}];
  data.guests=[{name:'Emma & James',status:'yes',table:'1'},{name:'Sarah & Tom',status:'yes',table:'1'},{name:'Mike & Lisa',status:'pending',table:'2'},{name:'David Chen',status:'pending',table:'2'},{name:'Anna Williams',status:'no',table:''}];
  data.timeline=[{time:'2:00 PM',event:'Bride getting ready'},{time:'3:30 PM',event:'Ceremony begins'},{time:'4:00 PM',event:'Vows & ring exchange'},{time:'4:30 PM',event:'Photos session'},{time:'6:00 PM',event:'Reception & dinner'},{time:'8:00 PM',event:'First dance'},{time:'8:30 PM',event:'Cake cutting'},{time:'11:00 PM',event:'Last dance & send-off'}];
  data.vendors=[{name:'Grand Hotel',service:'Venue',phone:'+1 555 100 2000'},{name:'Chef Antonio',service:'Catering',phone:'+1 555 200 3000'},{name:'Sarah Photos',service:'Photography',phone:'+1 555 300 4000'}];
  save();
}

function renderAll(){
  // Overview stats
  const done=data.checklist.filter(c=>c.done).length;
  const spent=data.budget.reduce((s,b)=>s+b.amount,0);
  const confirmed=data.guests.filter(g=>g.status==='yes').length;
  document.getElementById('overview-stats').innerHTML=`
    <div class="stat rose"><div class="num">${done}/${data.checklist.length}</div><div class="lbl">Tasks Done</div></div>
    <div class="stat gold"><div class="num">$${(spent/1000).toFixed(1)}K</div><div class="lbl">Spent</div></div>
    <div class="stat"><div class="num">${data.guests.length}</div><div class="lbl">Guests</div></div>
    <div class="stat"><div class="num">${confirmed}</div><div class="lbl">Confirmed</div></div>`;
  // Upcoming tasks
  const upcoming=data.checklist.filter(c=>!c.done).slice(0,5);
  document.getElementById('upcoming-tasks').innerHTML=upcoming.length?upcoming.map(c=>`<div class="item"><span class="item-text">${c.text}</span></div>`).join(''):'<div class="empty">All done!</div>';
  // Budget overview
  const pct=Math.round(spent/data.totalBudget*100);
  document.getElementById('budget-overview').innerHTML=`<div style="margin-bottom:12px"><div style="display:flex;justify-content:space-between;font-size:0.82rem"><span style="color:var(--heading);font-weight:600">$${spent.toLocaleString()} spent</span><span style="color:#bbb">of $${data.totalBudget.toLocaleString()}</span></div><div class="budget-bar"><div class="budget-fill" style="width:${pct}%;background:${pct>90?'#dc2626':pct>70?'#d97706':'var(--accent)'}"></div></div></div>`;
  // Checklist
  document.getElementById('check-count').textContent=data.checklist.length;
  document.getElementById('checklist-body').innerHTML=data.checklist.map((c,i)=>`<div class="item"><button class="check ${c.done?'done':''}" onclick="data.checklist[${i}].done=!data.checklist[${i}].done;save();renderAll()">${c.done?'&#10003;':''}</button><span class="item-text ${c.done?'done':''}">${c.text}</span><button class="item-del" onclick="data.checklist.splice(${i},1);save();renderAll()">x</button></div>`).join('');
  // Budget
  document.getElementById('exp-count').textContent=data.budget.length;
  document.getElementById('budget-stats').innerHTML=`<div class="stat gold"><div class="num">$${spent.toLocaleString()}</div><div class="lbl">Total Spent</div></div><div class="stat"><div class="num">$${(data.totalBudget-spent).toLocaleString()}</div><div class="lbl">Remaining</div></div><div class="stat rose"><div class="num">${pct}%</div><div class="lbl">Used</div></div><div class="stat"><div class="num">${data.budget.length}</div><div class="lbl">Items</div></div>`;
  document.getElementById('budget-body').innerHTML=data.budget.map((b,i)=>`<div class="budget-row"><span class="cat">${b.item}</span><span class="item-meta">${b.cat}</span><span class="amt">$${b.amount.toLocaleString()}</span><button class="item-del" style="opacity:1;font-size:0.7rem" onclick="data.budget.splice(${i},1);save();renderAll()">x</button></div>`).join('');
  // Guests
  document.getElementById('guest-count').textContent=data.guests.length;
  document.getElementById('guests-body').innerHTML=data.guests.map((g,i)=>`<div class="item"><span class="item-text">${g.name}</span><span class="guest-badge ${g.status}">${g.status==='yes'?'Confirmed':g.status==='no'?'Declined':'Pending'}</span>${g.table?`<span class="item-meta">Table ${g.table}</span>`:''}<button class="item-del" onclick="data.guests.splice(${i},1);save();renderAll()">x</button></div>`).join('');
  // Timeline
  document.getElementById('timeline-body').innerHTML=data.timeline.map((t,i)=>`<div class="timeline-item"><div class="tl-dot"></div><div><div class="tl-title">${t.event}</div><div class="tl-date">${t.time}</div></div><button class="item-del" style="margin-left:auto" onclick="data.timeline.splice(${i},1);save();renderAll()">x</button></div>`).join('');
  // Vendors
  document.getElementById('vendor-count').textContent=data.vendors.length;
  document.getElementById('vendors-body').innerHTML=data.vendors.map((v,i)=>`<div class="item"><span class="item-text">${v.name}</span><span class="item-meta">${v.service}</span><span class="item-meta">${v.phone}</span><button class="item-del" onclick="data.vendors.splice(${i},1);save();renderAll()">x</button></div>`).join('');
}

function addCheck(){const input=document.getElementById('check-input');if(!input.value.trim())return;data.checklist.push({text:input.value.trim(),done:false});input.value='';save();renderAll();}
function addBudget(){const item=document.getElementById('bud-item'),amount=document.getElementById('bud-amount'),cat=document.getElementById('bud-cat');if(!item.value.trim()||!amount.value)return;data.budget.push({item:item.value.trim(),amount:+amount.value,cat:cat.value});item.value='';amount.value='';save();renderAll();}
function addGuest(){const name=document.getElementById('guest-name'),status=document.getElementById('guest-status'),table=document.getElementById('guest-table');if(!name.value.trim())return;data.guests.push({name:name.value.trim(),status:status.value,table:table.value});name.value='';table.value='';save();renderAll();}
function addTimeline(){const time=document.getElementById('tl-time'),event=document.getElementById('tl-event');if(!event.value.trim())return;data.timeline.push({time:time.value,event:event.value.trim()});time.value='';event.value='';save();renderAll();}
function addVendor(){const name=document.getElementById('v-name'),service=document.getElementById('v-service'),phone=document.getElementById('v-phone');if(!name.value.trim())return;data.vendors.push({name:name.value.trim(),service:service.value,phone:phone.value});name.value='';service.value='';phone.value='';save();renderAll();}
function exportData(){const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});const a=document.createElement('a');a.download='wedding-planner.json';a.href=URL.createObjectURL(blob);a.click();}
function importData(input){const file=input.files[0];if(!file)return;const r=new FileReader();r.onload=e=>{data=JSON.parse(e.target.result);save();renderAll();alert('Imported!');};r.readAsText(file);}

renderAll();
</script>
</body>
</html>
