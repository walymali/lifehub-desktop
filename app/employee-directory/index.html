<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Employee Directory</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f5f5f3;
  --card: #fff;
  --heading: #1a1a1a;
  --text: #555;
  --border: #e8e8e6;
  --accent: #1a1a1a;
  --active: #22c55e;
  --on-leave: #eab308;
  --remote: #3b82f6;
  --active-bg: #dcfce7;
  --on-leave-bg: #fef9c3;
  --remote-bg: #dbeafe;
  --radius: 10px;
  --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-lg: 0 8px 30px rgba(0,0,0,0.1);
}

body {
  font-family: 'Sora', sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
}

/* Header */
.header {
  background: var(--card);
  border-bottom: 1px solid var(--border);
  padding: 20px 40px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 16px;
}

.header-left {
  display: flex;
  align-items: center;
  gap: 14px;
}

.header-logo {
  width: 38px;
  height: 38px;
  background: var(--accent);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.header-logo svg { width: 20px; height: 20px; }

.header h1 {
  font-size: 20px;
  font-weight: 700;
  color: var(--heading);
  letter-spacing: -0.3px;
}

.header-actions {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}

/* Buttons */
.btn {
  font-family: 'Sora', sans-serif;
  font-size: 13px;
  font-weight: 500;
  padding: 9px 18px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--card);
  color: var(--heading);
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 7px;
  transition: all 0.15s ease;
  white-space: nowrap;
}

.btn:hover { background: var(--bg); }

.btn-primary {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}

.btn-primary:hover { background: #333; }

.btn-danger {
  background: #fee2e2;
  color: #dc2626;
  border-color: #fecaca;
}

.btn-danger:hover { background: #fecaca; }

.btn svg { width: 15px; height: 15px; flex-shrink: 0; }

/* Controls Bar */
.controls {
  padding: 20px 40px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
}

.search-box {
  flex: 1;
  min-width: 220px;
  max-width: 380px;
  position: relative;
}

.search-box svg {
  position: absolute;
  left: 13px;
  top: 50%;
  transform: translateY(-50%);
  width: 16px;
  height: 16px;
  color: #aaa;
  pointer-events: none;
}

.search-box input {
  width: 100%;
  padding: 10px 14px 10px 38px;
  border: 1px solid var(--border);
  border-radius: 8px;
  font-family: 'Sora', sans-serif;
  font-size: 13px;
  background: var(--card);
  color: var(--heading);
  outline: none;
  transition: border-color 0.15s;
}

.search-box input:focus { border-color: #bbb; }

.filter-select {
  font-family: 'Sora', sans-serif;
  font-size: 13px;
  padding: 10px 14px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--card);
  color: var(--heading);
  cursor: pointer;
  outline: none;
  min-width: 160px;
}

.view-toggle {
  display: flex;
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
  margin-left: auto;
}

.view-btn {
  padding: 9px 14px;
  background: var(--card);
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  color: var(--text);
  transition: all 0.15s;
}

.view-btn:first-child { border-right: 1px solid var(--border); }
.view-btn.active { background: var(--accent); color: #fff; }
.view-btn svg { width: 16px; height: 16px; }

/* Stats Bar */
.stats-bar {
  padding: 0 40px 16px;
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

.stat-chip {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 16px;
  font-size: 12px;
  font-weight: 500;
  color: var(--heading);
  display: flex;
  align-items: center;
  gap: 8px;
}

.stat-chip .count {
  background: var(--bg);
  padding: 2px 9px;
  border-radius: 20px;
  font-weight: 600;
  font-size: 12px;
}

.stat-chip.total .count { background: var(--accent); color: #fff; }

/* Grid View */
.main-content { padding: 0 40px 40px; }

.grid-view {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
  gap: 16px;
}

.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
  cursor: pointer;
  transition: all 0.2s ease;
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
}

.card:hover {
  box-shadow: var(--shadow-lg);
  transform: translateY(-2px);
}

.card-photo {
  width: 72px;
  height: 72px;
  border-radius: 50%;
  object-fit: cover;
  margin-bottom: 14px;
  background: var(--bg);
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  flex-shrink: 0;
}

.card-photo img { width: 100%; height: 100%; object-fit: cover; }

.card-photo .initials {
  font-size: 22px;
  font-weight: 600;
  color: var(--text);
}

.card-name {
  font-size: 15px;
  font-weight: 600;
  color: var(--heading);
  margin-bottom: 2px;
}

.card-role {
  font-size: 12px;
  color: var(--text);
  margin-bottom: 8px;
}

.card-dept {
  font-size: 11px;
  font-weight: 500;
  color: var(--text);
  background: var(--bg);
  padding: 3px 12px;
  border-radius: 20px;
  margin-bottom: 10px;
}

.badge {
  font-size: 11px;
  font-weight: 600;
  padding: 3px 12px;
  border-radius: 20px;
  text-transform: capitalize;
}

.badge-active { background: var(--active-bg); color: #16a34a; }
.badge-on-leave { background: var(--on-leave-bg); color: #a16207; }
.badge-remote { background: var(--remote-bg); color: #2563eb; }

/* List View */
.list-view { display: none; }

.list-table {
  width: 100%;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  border-collapse: separate;
  border-spacing: 0;
  overflow: hidden;
}

.list-table th {
  text-align: left;
  padding: 13px 18px;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text);
  background: var(--bg);
  border-bottom: 1px solid var(--border);
}

.list-table td {
  padding: 12px 18px;
  font-size: 13px;
  border-bottom: 1px solid var(--border);
  vertical-align: middle;
}

.list-table tr:last-child td { border-bottom: none; }

.list-table tbody tr {
  cursor: pointer;
  transition: background 0.1s;
}

.list-table tbody tr:hover { background: #fafaf8; }

.list-employee {
  display: flex;
  align-items: center;
  gap: 12px;
}

.list-photo {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: var(--bg);
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  flex-shrink: 0;
}

.list-photo img { width: 100%; height: 100%; object-fit: cover; }

.list-photo .initials {
  font-size: 12px;
  font-weight: 600;
  color: var(--text);
}

.list-name {
  font-weight: 600;
  color: var(--heading);
}

/* Modal Overlay */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  z-index: 1000;
  align-items: center;
  justify-content: center;
  padding: 20px;
  backdrop-filter: blur(3px);
}

.modal-overlay.active { display: flex; }

.modal {
  background: var(--card);
  border-radius: 14px;
  width: 100%;
  max-width: 540px;
  max-height: 90vh;
  overflow-y: auto;
  box-shadow: var(--shadow-lg);
  animation: modalIn 0.2s ease;
}

@keyframes modalIn {
  from { opacity: 0; transform: scale(0.95) translateY(10px); }
  to { opacity: 1; transform: scale(1) translateY(0); }
}

.modal-header {
  padding: 22px 28px 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.modal-header h2 {
  font-size: 17px;
  font-weight: 700;
  color: var(--heading);
}

.modal-close {
  width: 32px;
  height: 32px;
  border-radius: 8px;
  border: none;
  background: var(--bg);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text);
  transition: background 0.15s;
}

.modal-close:hover { background: var(--border); }
.modal-close svg { width: 16px; height: 16px; }

.modal-body { padding: 22px 28px 28px; }

/* Detail Modal */
.detail-top {
  display: flex;
  align-items: center;
  gap: 18px;
  margin-bottom: 24px;
}

.detail-photo {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  background: var(--bg);
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  flex-shrink: 0;
}

.detail-photo img { width: 100%; height: 100%; object-fit: cover; }

.detail-photo .initials {
  font-size: 26px;
  font-weight: 600;
  color: var(--text);
}

.detail-info h3 {
  font-size: 20px;
  font-weight: 700;
  color: var(--heading);
  margin-bottom: 3px;
}

.detail-info p {
  font-size: 13px;
  color: var(--text);
}

.detail-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-bottom: 24px;
}

.detail-field label {
  display: block;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.4px;
  color: var(--text);
  margin-bottom: 4px;
}

.detail-field span {
  font-size: 14px;
  color: var(--heading);
  font-weight: 500;
}

.detail-actions {
  display: flex;
  gap: 10px;
  padding-top: 20px;
  border-top: 1px solid var(--border);
}

/* Form */
.form-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}

.form-group { display: flex; flex-direction: column; }
.form-group.full { grid-column: 1 / -1; }

.form-group label {
  font-size: 12px;
  font-weight: 600;
  color: var(--heading);
  margin-bottom: 6px;
}

.form-group input,
.form-group select {
  font-family: 'Sora', sans-serif;
  font-size: 13px;
  padding: 10px 14px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--card);
  color: var(--heading);
  outline: none;
  transition: border-color 0.15s;
}

.form-group input:focus,
.form-group select:focus { border-color: #bbb; }

.photo-upload {
  display: flex;
  align-items: center;
  gap: 16px;
  grid-column: 1 / -1;
}

.photo-preview {
  width: 64px;
  height: 64px;
  border-radius: 50%;
  background: var(--bg);
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  flex-shrink: 0;
  border: 2px dashed var(--border);
}

.photo-preview img { width: 100%; height: 100%; object-fit: cover; }
.photo-preview svg { width: 24px; height: 24px; color: #bbb; }

.form-actions {
  display: flex;
  gap: 10px;
  justify-content: flex-end;
  margin-top: 22px;
  padding-top: 18px;
  border-top: 1px solid var(--border);
}

.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text);
}

.empty-state svg { width: 48px; height: 48px; margin-bottom: 16px; color: #ccc; }
.empty-state h3 { font-size: 16px; font-weight: 600; color: var(--heading); margin-bottom: 6px; }
.empty-state p { font-size: 13px; }

/* Responsive */
@media (max-width: 768px) {
  .header, .controls, .stats-bar, .main-content { padding-left: 20px; padding-right: 20px; }
  .grid-view { grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); }
  .form-grid { grid-template-columns: 1fr; }
  .detail-grid { grid-template-columns: 1fr; }
  .modal { max-width: 100%; }
}
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-left">
    <div class="header-logo">
      <svg fill="none" viewBox="0 0 24 24" stroke="white" stroke-width="2"><path d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
    </div>
    <h1>Employee Directory</h1>
  </div>
  <div class="header-actions">
    <button class="btn" onclick="exportData()">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
      Export JSON
    </button>
    <button class="btn" onclick="document.getElementById('importFile').click()">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg>
      Import JSON
    </button>
    <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
    <button class="btn btn-primary" onclick="openAddModal()">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M12 4v16m8-8H4"/></svg>
      Add Employee
    </button>
  </div>
</div>

<!-- Controls -->
<div class="controls">
  <div class="search-box">
    <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
    <input type="text" id="searchInput" placeholder="Search by name, role, email..." oninput="renderEmployees()">
  </div>
  <select class="filter-select" id="deptFilter" onchange="renderEmployees()">
    <option value="">All Departments</option>
  </select>
  <select class="filter-select" id="statusFilter" onchange="renderEmployees()">
    <option value="">All Statuses</option>
    <option value="active">Active</option>
    <option value="on-leave">On Leave</option>
    <option value="remote">Remote</option>
  </select>
  <div class="view-toggle">
    <button class="view-btn active" id="gridBtn" onclick="setView('grid')" title="Grid view">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
    </button>
    <button class="view-btn" id="listBtn" onclick="setView('list')" title="List view">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
    </button>
  </div>
</div>

<!-- Stats -->
<div class="stats-bar" id="statsBar"></div>

<!-- Main Content -->
<div class="main-content">
  <div class="grid-view" id="gridView"></div>
  <div class="list-view" id="listView">
    <table class="list-table">
      <thead>
        <tr>
          <th>Employee</th>
          <th>Department</th>
          <th>Role</th>
          <th>Email</th>
          <th>Phone</th>
          <th>Status</th>
          <th>Start Date</th>
        </tr>
      </thead>
      <tbody id="listBody"></tbody>
    </table>
  </div>
  <div class="empty-state" id="emptyState" style="display:none">
    <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path d="M15 19.128a9.38 9.38 0 002.625.372 9.337 9.337 0 004.121-.952 4.125 4.125 0 00-7.533-2.493M15 19.128v-.003c0-1.113-.285-2.16-.786-3.07M15 19.128v.106A12.318 12.318 0 018.624 21c-2.331 0-4.512-.645-6.374-1.766l-.001-.109a6.375 6.375 0 0111.964-3.07M12 6.375a3.375 3.375 0 11-6.75 0 3.375 3.375 0 016.75 0zm8.25 2.25a2.625 2.625 0 11-5.25 0 2.625 2.625 0 015.25 0z"/></svg>
    <h3>No employees found</h3>
    <p>Try adjusting your search or filter criteria.</p>
  </div>
</div>

<!-- Detail Modal -->
<div class="modal-overlay" id="detailModal">
  <div class="modal">
    <div class="modal-header">
      <h2>Employee Details</h2>
      <button class="modal-close" onclick="closeModal('detailModal')">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="modal-body" id="detailBody"></div>
  </div>
</div>

<!-- Add/Edit Modal -->
<div class="modal-overlay" id="formModal">
  <div class="modal">
    <div class="modal-header">
      <h2 id="formTitle">Add Employee</h2>
      <button class="modal-close" onclick="closeModal('formModal')">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <form id="employeeForm" onsubmit="saveEmployee(event)">
        <input type="hidden" id="editId">
        <div class="photo-upload">
          <div class="photo-preview" id="photoPreview">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path d="M6.827 6.175A2.31 2.31 0 015.186 7.23c-.38.054-.757.112-1.134.175C2.999 7.58 2.25 8.507 2.25 9.574V18a2.25 2.25 0 002.25 2.25h15A2.25 2.25 0 0021.75 18V9.574c0-1.067-.75-1.994-1.802-2.169a47.865 47.865 0 00-1.134-.175 2.31 2.31 0 01-1.64-1.055l-.822-1.316a2.192 2.192 0 00-1.736-1.039 48.774 48.774 0 00-5.232 0 2.192 2.192 0 00-1.736 1.039l-.821 1.316z"/><path d="M16.5 12.75a4.5 4.5 0 11-9 0 4.5 4.5 0 019 0z"/></svg>
          </div>
          <div>
            <button type="button" class="btn" onclick="document.getElementById('photoInput').click()">Upload Photo</button>
            <input type="file" id="photoInput" accept="image/*" style="display:none" onchange="previewPhoto(event)">
            <p style="font-size:11px;color:var(--text);margin-top:4px">JPG, PNG. Stored as base64.</p>
          </div>
        </div>
        <div class="form-grid" style="margin-top:18px">
          <div class="form-group">
            <label>Full Name *</label>
            <input type="text" id="empName" required placeholder="Jane Smith">
          </div>
          <div class="form-group">
            <label>Email *</label>
            <input type="email" id="empEmail" required placeholder="jane@company.com">
          </div>
          <div class="form-group">
            <label>Phone</label>
            <input type="tel" id="empPhone" placeholder="+1 (555) 123-4567">
          </div>
          <div class="form-group">
            <label>Department *</label>
            <input type="text" id="empDept" required placeholder="Engineering" list="deptList">
            <datalist id="deptList"></datalist>
          </div>
          <div class="form-group">
            <label>Role *</label>
            <input type="text" id="empRole" required placeholder="Software Engineer">
          </div>
          <div class="form-group">
            <label>Start Date</label>
            <input type="date" id="empStart">
          </div>
          <div class="form-group">
            <label>Status *</label>
            <select id="empStatus" required>
              <option value="active">Active</option>
              <option value="on-leave">On Leave</option>
              <option value="remote">Remote</option>
            </select>
          </div>
        </div>
        <div class="form-actions">
          <button type="button" class="btn" onclick="closeModal('formModal')">Cancel</button>
          <button type="submit" class="btn btn-primary" id="formSubmit">Add Employee</button>
        </div>
      </form>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = 'employee_directory';
let currentView = 'grid';
let currentPhotoData = '';

// --- Demo Data ---
const demoEmployees = [
  {
    id: '1', name: 'Sarah Chen', email: 'sarah.chen@company.com', phone: '+1 (415) 555-0101',
    department: 'Engineering', role: 'Senior Software Engineer', startDate: '2021-03-15',
    status: 'active', photo: ''
  },
  {
    id: '2', name: 'Marcus Johnson', email: 'marcus.j@company.com', phone: '+1 (415) 555-0102',
    department: 'Engineering', role: 'Frontend Developer', startDate: '2022-07-01',
    status: 'remote', photo: ''

// --- Data Layer ---
function loadEmployees() {
  const data = localStorage.getItem(STORAGE_KEY);
  if (data) return JSON.parse(data);
  // First load: seed demo data
  saveToStorage(demoEmployees);
  return demoEmployees;
}

function saveToStorage(employees) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(employees));
}

function getEmployees() {
  return loadEmployees();
}

function generateId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
}

// --- Filtering ---
function getFilteredEmployees() {
  let employees = getEmployees();
  const search = document.getElementById('searchInput').value.toLowerCase().trim();
  const dept = document.getElementById('deptFilter').value;
  const status = document.getElementById('statusFilter').value;

  if (search) {
    employees = employees.filter(e =>
      e.name.toLowerCase().includes(search) ||
      e.role.toLowerCase().includes(search) ||
      e.email.toLowerCase().includes(search) ||
      e.department.toLowerCase().includes(search)
    );
  }
  if (dept) employees = employees.filter(e => e.department === dept);
  if (status) employees = employees.filter(e => e.status === status);

  return employees;
}

// --- Rendering ---
function getInitials(name) {
  return name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
}

function getBadgeClass(status) {
  return 'badge badge-' + status;
}

function formatStatus(status) {
  if (status === 'on-leave') return 'On Leave';
  return status.charAt(0).toUpperCase() + status.slice(1);
}

function formatDate(dateStr) {
  if (!dateStr) return '--';
  const d = new Date(dateStr + 'T00:00:00');
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

function photoHTML(photo, name, cls) {
  if (photo) return `<${cls === 'card-photo' ? 'div' : 'div'} class="${cls}"><img src="${photo}" alt="${name}"></${cls === 'card-photo' ? 'div' : 'div'}>`;
  return `<div class="${cls}"><span class="initials">${getInitials(name)}</span></div>`;
}

function renderEmployees() {
  const employees = getFilteredEmployees();
  const gridView = document.getElementById('gridView');
  const listBody = document.getElementById('listBody');
  const emptyState = document.getElementById('emptyState');

  // Grid
  if (employees.length === 0) {
    gridView.innerHTML = '';
    listBody.innerHTML = '';
    emptyState.style.display = 'block';
  } else {
    emptyState.style.display = 'none';

    gridView.innerHTML = employees.map(e => `
      <div class="card" onclick="openDetail('${e.id}')">
        ${photoHTML(e.photo, e.name, 'card-photo')}
        <div class="card-name">${e.name}</div>
        <div class="card-role">${e.role}</div>
        <div class="card-dept">${e.department}</div>
        <span class="${getBadgeClass(e.status)}">${formatStatus(e.status)}</span>
      </div>
    `).join('');

    listBody.innerHTML = employees.map(e => `
      <tr onclick="openDetail('${e.id}')">
        <td>
          <div class="list-employee">
            ${photoHTML(e.photo, e.name, 'list-photo')}
            <span class="list-name">${e.name}</span>
          </div>
        </td>
        <td>${e.department}</td>
        <td>${e.role}</td>
        <td>${e.email}</td>
        <td>${e.phone || '--'}</td>
        <td><span class="${getBadgeClass(e.status)}">${formatStatus(e.status)}</span></td>
        <td>${formatDate(e.startDate)}</td>
      </tr>
    `).join('');
  }

  renderStats();
  updateDeptFilter();
}

function renderStats() {
  const all = getEmployees();
  const depts = {};
  all.forEach(e => { depts[e.department] = (depts[e.department] || 0) + 1; });

  const bar = document.getElementById('statsBar');
  let html = `<div class="stat-chip total">Total <span class="count">${all.length}</span></div>`;
  Object.keys(depts).sort().forEach(d => {
    html += `<div class="stat-chip">${d} <span class="count">${depts[d]}</span></div>`;
  });
  bar.innerHTML = html;
}

function updateDeptFilter() {
  const all = getEmployees();
  const depts = [...new Set(all.map(e => e.department))].sort();
  const select = document.getElementById('deptFilter');
  const current = select.value;
  select.innerHTML = '<option value="">All Departments</option>' +
    depts.map(d => `<option value="${d}" ${d === current ? 'selected' : ''}>${d}</option>`).join('');

  // Also update datalist
  const datalist = document.getElementById('deptList');
  datalist.innerHTML = depts.map(d => `<option value="${d}">`).join('');
}

// --- View Toggle ---
function setView(view) {
  currentView = view;
  document.getElementById('gridView').style.display = view === 'grid' ? 'grid' : 'none';
  document.getElementById('listView').style.display = view === 'list' ? 'block' : 'none';
  document.getElementById('gridBtn').classList.toggle('active', view === 'grid');
  document.getElementById('listBtn').classList.toggle('active', view === 'list');
}

// --- Modals ---
function openModal(id) {
  document.getElementById(id).classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeModal(id) {
  document.getElementById(id).classList.remove('active');
  document.body.style.overflow = '';
}

// Close on overlay click
document.querySelectorAll('.modal-overlay').forEach(overlay => {
  overlay.addEventListener('click', e => {
    if (e.target === overlay) closeModal(overlay.id);
  });
});

// Close on Escape
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    document.querySelectorAll('.modal-overlay.active').forEach(m => closeModal(m.id));
  }
});

// --- Detail Modal ---
function openDetail(id) {
  const emp = getEmployees().find(e => e.id === id);
  if (!emp) return;

  document.getElementById('detailBody').innerHTML = `
    <div class="detail-top">
      ${photoHTML(emp.photo, emp.name, 'detail-photo')}
      <div class="detail-info">
        <h3>${emp.name}</h3>
        <p>${emp.role}</p>
        <span class="${getBadgeClass(emp.status)}" style="display:inline-block;margin-top:6px">${formatStatus(emp.status)}</span>
      </div>
    </div>
    <div class="detail-grid">
      <div class="detail-field"><label>Email</label><span>${emp.email}</span></div>
      <div class="detail-field"><label>Phone</label><span>${emp.phone || '--'}</span></div>
      <div class="detail-field"><label>Department</label><span>${emp.department}</span></div>
      <div class="detail-field"><label>Role</label><span>${emp.role}</span></div>
      <div class="detail-field"><label>Start Date</label><span>${formatDate(emp.startDate)}</span></div>
      <div class="detail-field"><label>Status</label><span>${formatStatus(emp.status)}</span></div>
    </div>
    <div class="detail-actions">
      <button class="btn" onclick="openEditModal('${emp.id}')">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
        Edit
      </button>
      <button class="btn btn-danger" onclick="deleteEmployee('${emp.id}')">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
        Delete
      </button>
    </div>
  `;
  openModal('detailModal');
}

// --- Add / Edit ---
function openAddModal() {
  document.getElementById('formTitle').textContent = 'Add Employee';
  document.getElementById('formSubmit').textContent = 'Add Employee';
  document.getElementById('editId').value = '';
  document.getElementById('employeeForm').reset();
  currentPhotoData = '';
  document.getElementById('photoPreview').innerHTML = '<svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path d="M6.827 6.175A2.31 2.31 0 015.186 7.23c-.38.054-.757.112-1.134.175C2.999 7.58 2.25 8.507 2.25 9.574V18a2.25 2.25 0 002.25 2.25h15A2.25 2.25 0 0021.75 18V9.574c0-1.067-.75-1.994-1.802-2.169a47.865 47.865 0 00-1.134-.175 2.31 2.31 0 01-1.64-1.055l-.822-1.316a2.192 2.192 0 00-1.736-1.039 48.774 48.774 0 00-5.232 0 2.192 2.192 0 00-1.736 1.039l-.821 1.316z"/><path d="M16.5 12.75a4.5 4.5 0 11-9 0 4.5 4.5 0 019 0z"/></svg>';
  openModal('formModal');
}

function openEditModal(id) {
  closeModal('detailModal');
  const emp = getEmployees().find(e => e.id === id);
  if (!emp) return;

  document.getElementById('formTitle').textContent = 'Edit Employee';
  document.getElementById('formSubmit').textContent = 'Save Changes';
  document.getElementById('editId').value = emp.id;
  document.getElementById('empName').value = emp.name;
  document.getElementById('empEmail').value = emp.email;
  document.getElementById('empPhone').value = emp.phone || '';
  document.getElementById('empDept').value = emp.department;
  document.getElementById('empRole').value = emp.role;
  document.getElementById('empStart').value = emp.startDate || '';
  document.getElementById('empStatus').value = emp.status;

  currentPhotoData = emp.photo || '';
  if (emp.photo) {
    document.getElementById('photoPreview').innerHTML = `<img src="${emp.photo}" alt="Photo">`;
  } else {
    document.getElementById('photoPreview').innerHTML = '<svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path d="M6.827 6.175A2.31 2.31 0 015.186 7.23c-.38.054-.757.112-1.134.175C2.999 7.58 2.25 8.507 2.25 9.574V18a2.25 2.25 0 002.25 2.25h15A2.25 2.25 0 0021.75 18V9.574c0-1.067-.75-1.994-1.802-2.169a47.865 47.865 0 00-1.134-.175 2.31 2.31 0 01-1.64-1.055l-.822-1.316a2.192 2.192 0 00-1.736-1.039 48.774 48.774 0 00-5.232 0 2.192 2.192 0 00-1.736 1.039l-.821 1.316z"/><path d="M16.5 12.75a4.5 4.5 0 11-9 0 4.5 4.5 0 019 0z"/></svg>';
  }

  openModal('formModal');
}

function previewPhoto(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    currentPhotoData = e.target.result;
    document.getElementById('photoPreview').innerHTML = `<img src="${currentPhotoData}" alt="Preview">`;
  };
  reader.readAsDataURL(file);
}

function saveEmployee(event) {
  event.preventDefault();
  const employees = getEmployees();
  const editId = document.getElementById('editId').value;

  const empData = {
    id: editId || generateId(),
    name: document.getElementById('empName').value.trim(),
    email: document.getElementById('empEmail').value.trim(),
    phone: document.getElementById('empPhone').value.trim(),
    department: document.getElementById('empDept').value.trim(),
    role: document.getElementById('empRole').value.trim(),
    startDate: document.getElementById('empStart').value,
    status: document.getElementById('empStatus').value,
    photo: currentPhotoData
  };

  if (editId) {
    const idx = employees.findIndex(e => e.id === editId);
    if (idx !== -1) employees[idx] = empData;
  } else {
    employees.push(empData);
  }

  saveToStorage(employees);
  closeModal('formModal');
  renderEmployees();
}

function deleteEmployee(id) {
  if (!confirm('Are you sure you want to delete this employee?')) return;
  let employees = getEmployees().filter(e => e.id !== id);
  saveToStorage(employees);
  closeModal('detailModal');
  renderEmployees();
}

// --- Export / Import ---
function exportData() {
  const data = getEmployees();
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'employee_directory_' + new Date().toISOString().slice(0, 10) + '.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      if (!Array.isArray(data)) throw new Error('Invalid format');
      // Validate each entry has at minimum id and name
      data.forEach(emp => {
        if (!emp.name) throw new Error('Each employee must have a name');
        if (!emp.id) emp.id = generateId();
        if (!emp.status) emp.status = 'active';
      });
      saveToStorage(data);
      renderEmployees();
      alert('Imported ' + data.length + ' employees successfully.');
    } catch (err) {
      alert('Import failed: ' + err.message);
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

// --- Init ---
renderEmployees();
